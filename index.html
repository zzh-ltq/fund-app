<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>基金涨幅卡 · 分组版（性能优化）</title>
    <!-- Chart.js 轻量绘图 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- AWS SDK for R2 -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
    <style>
        /* 样式与之前完全一致，此处省略以节省篇幅，实际使用时请保留原样式 */
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f3f5f9; margin: 0; padding: 24px 16px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1200px; width: 100%; }
        .header { background: white; border-radius: 28px; padding: 20px 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.02); margin-bottom: 20px; }
        h1 { margin: 0 0 8px; font-size: 1.8rem; font-weight: 600; color: #0b1b32; display: flex; gap: 8px; flex-wrap: wrap; }
        h1 span { background: #eef2ff; color: #1d4ed8; font-size: 0.85rem; padding: 4px 12px; border-radius: 40px; }
        .sub { color: #4b587c; margin-bottom: 16px; font-size: 0.9rem; border-left: 3px solid #3b82f6; padding-left: 16px; background: #fafbff; border-radius: 0 8px 8px 0; }
        .group-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0 16px; align-items: center; }
        .group-tab { background: #f0f2f8; border-radius: 40px; padding: 8px 18px; font-size: 0.9rem; font-weight: 500; color: #2d3a5e; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .group-tab.active { background: #0b1b32; color: white; }
        .group-tab .warning-badge { background: #f97316; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; }
        .group-tab .delete-group { margin-left: 4px; background: none; border: none; color: inherit; font-size: 16px; cursor: pointer; opacity: 0.6; }
        .add-group-btn { background: #e4e9f5; border: none; border-radius: 40px; width: 36px; height: 36px; font-size: 20px; cursor: pointer; color: #2d3a5e; }
        .add-area { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
        .input-wrapper { flex: 2 1 260px; }
        .input-wrapper input { width: 100%; padding: 14px 18px; border: 1.5px solid #e1e6f0; border-radius: 44px; font-size: 0.95rem; }
        .group-select { padding: 14px 18px; border-radius: 44px; border: 1.5px solid #e1e6f0; background: white; font-size: 0.95rem; min-width: 120px; }
        .add-btn { background: #0b1b32; color: white; border: none; padding: 14px 28px; border-radius: 60px; font-size: 0.95rem; font-weight: 500; cursor: pointer; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; margin-top: 20px; }
        .card { background: white; border-radius: 24px; padding: 16px; box-shadow: 0 12px 30px -8px rgba(0,20,50,0.1); cursor: pointer; position: relative; }
        .card.risk-highlight { border: 2px solid #f97316; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .fund-title { font-weight: 700; font-size: 1rem; color: #0b1b32; max-width: 65%; }
        .fund-code { font-size: 0.7rem; background: #eef2f9; padding: 3px 8px; border-radius: 40px; }
        .delete-btn { background: white; border: 1px solid #e9ecf5; width: 30px; height: 30px; border-radius: 50%; font-size: 16px; color: #8f9fc0; cursor: pointer; z-index: 2; }
        .latest-info { display: flex; justify-content: space-between; font-size: 0.75rem; background: #f8faff; padding: 6px 10px; border-radius: 18px; margin-bottom: 8px; }
        .rates-grid { display: flex; flex-wrap: wrap; gap: 8px 4px; background: #f8faff; padding: 12px 8px; border-radius: 20px; }
        .rate-item { flex: 1 0 auto; min-width: 50px; text-align: center; }
        .rate-label { font-size: 0.6rem; color: #5c6b93; }
        .rate-value { font-size: 1rem; font-weight: 600; }
        .rate-value.positive { color: #cf3e3e; }
        .rate-value.negative { color: #2e7d5e; }
        .risk-tag { font-size: 0.7rem; background: #f97316; color: white; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 32px; padding: 24px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .period-selector { display: flex; gap: 8px; margin: 16px 0; }
        .period-btn { background: #eef2f9; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .period-btn.active { background: #0b1b32; color: white; }
        .chart-container { width: 100%; height: 300px; }
        .sync-area { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
        .sync-btn { background: #eef2f6; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .footer-note { margin-top: 30px; font-size: 0.75rem; color: #9aa9c2; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📈 基金分组看板 <span>云端同步·风险标记</span></h1>
        <div class="sub">近3/5/7/10/15日涨幅 · 最新净值 · 15日最大跌幅≥8.5%高亮</div>
        
        <div class="group-tabs" id="groupTabs"></div>

        <div class="add-area">
            <div class="input-wrapper">
                <input type="text" id="fundCodeInput" placeholder="基金代码 (如 160119)" pattern="\d*" inputmode="numeric">
            </div>
            <select id="groupSelect" class="group-select"></select>
            <button class="add-btn" id="addFundBtn">➕ 添加</button>
        </div>
    </div>

    <div id="cardContainer" class="card-grid"></div>

    <div class="sync-area">
        <button class="sync-btn" id="syncToCloudBtn">☁️ 手动同步云端</button>
        <span class="sync-status" id="syncStatus"></span>
    </div>
    <div class="footer-note">
        ✨ 点击卡片查看15/30/60/90日曲线 · 数据已优化，流畅运行
    </div>
</div>

<div class="modal" id="chartModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalFundName">基金名称</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="period-selector" id="periodSelector">
            <button class="period-btn active" data-days="15">15日</button>
            <button class="period-btn" data-days="30">30日</button>
            <button class="period-btn" data-days="60">60日</button>
            <button class="period-btn" data-days="90">90日</button>
        </div>
        <div class="chart-container">
            <canvas id="fundChart"></canvas>
        </div>
    </div>
</div>

<script>
(function() {
    // ---------- 配置 ----------
    const STORAGE_KEY = 'funds_app_data';
    const PERIODS = [3, 5, 7, 10, 15];
    const RISK_THRESHOLD = -8.5;
    const MAX_HISTORY_POINTS = 120; // 保留最近120个净值点（足够90天曲线）

    const R2_CONFIG = {
        bucketName: 'fund-list-app',
        accessKeyId: 'df123c57ee036af018c3f6f801fae726',
        secretAccessKey: 'c38798027a0815dae26376089d4f15eef26e2eb66487b4cf9346a17f26ff29e3',
        endpoint: 'https://d6ac8bc5f7ebda3a5ac875c4346917fe.r2.cloudflarestorage.com'
    };

    let s3 = null;
    try {
        s3 = new AWS.S3({
            endpoint: R2_CONFIG.endpoint,
            accessKeyId: R2_CONFIG.accessKeyId,
            secretAccessKey: R2_CONFIG.secretAccessKey,
            s3ForcePathStyle: true,
            signatureVersion: 'v4',
            region: 'auto'
        });
    } catch (e) { console.warn('S3 init failed', e); }

    let appData = { groups: [], fundsCache: {} };
    let currentGroupId = 'default';
    let chartInstance = null;
    let currentModalFund = null;

    // ---------- 本地存储 ----------
    function loadAppData() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                if (parsed && Array.isArray(parsed.groups)) {
                    appData = parsed;
                } else {
                    const oldCodes = Array.isArray(parsed) ? parsed : [];
                    appData = { groups: [{ id: 'default', name: '默认', fundCodes: oldCodes }], fundsCache: {} };
                }
            } else {
                appData = { groups: [{ id: 'default', name: '默认', fundCodes: [] }], fundsCache: {} };
            }
        } catch (e) {
            appData = { groups: [{ id: 'default', name: '默认', fundCodes: [] }], fundsCache: {} };
        }
        if (!appData.fundsCache) appData.fundsCache = {};
    }

    function saveAppData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        if (s3) saveToCloud(appData).catch(err => console.warn('cloud sync failed', err));
    }

    async function loadFromCloud() {
        if (!s3) throw new Error('S3未初始化');
        const params = { Bucket: R2_CONFIG.bucketName, Key: 'funds_app_data.json' };
        try {
            const data = await s3.getObject(params).promise();
            return JSON.parse(data.Body.toString('utf-8'));
        } catch (e) {
            if (e.code === 'NoSuchKey') return null;
            throw e;
        }
    }

    async function saveToCloud(data) {
        if (!s3) return;
        await s3.putObject({
            Bucket: R2_CONFIG.bucketName,
            Key: 'funds_app_data.json',
            Body: JSON.stringify(data),
            ContentType: 'application/json'
        }).promise();
    }

    // ---------- 分组渲染 ----------
    function renderGroups() {
        const tabsContainer = document.getElementById('groupTabs');
        const groupSelect = document.getElementById('groupSelect');
        if (!tabsContainer) return;

        let tabsHtml = '', optionsHtml = '';
        appData.groups.forEach(group => {
            const hasRisk = group.fundCodes.some(code => {
                const cached = appData.fundsCache[code];
                if (!cached || !cached.netWorth) return false;
                const maxDrop = computeMaxDrop(cached.netWorth, 15);
                return maxDrop !== null && maxDrop <= RISK_THRESHOLD;
            });
            const activeClass = group.id === currentGroupId ? 'active' : '';
            const warningBadge = hasRisk ? '<span class="warning-badge">!</span>' : '';
            const deleteBtn = group.id === 'default' ? '' : `<button class="delete-group" data-group-id="${group.id}">✕</button>`;
            tabsHtml += `<div class="group-tab ${activeClass}" data-group-id="${group.id}">${group.name} ${warningBadge} ${deleteBtn}</div>`;
            optionsHtml += `<option value="${group.id}">${group.name}</option>`;
        });
        tabsHtml += `<button class="add-group-btn" id="addGroupBtn">+</button>`;
        tabsContainer.innerHTML = tabsHtml;
        if (groupSelect) groupSelect.innerHTML = optionsHtml;

        document.querySelectorAll('.group-tab[data-group-id]').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-group')) return;
                const gid = el.getAttribute('data-group-id');
                if (gid) { currentGroupId = gid; renderGroups(); renderCards(); }
            });
        });

        document.querySelectorAll('.delete-group').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const gid = btn.getAttribute('data-group-id');
                if (gid && gid !== 'default') {
                    if (confirm(`删除分组，其下基金将移至默认分组`)) {
                        const defaultGroup = appData.groups.find(g => g.id === 'default');
                        const delGroup = appData.groups.find(g => g.id === gid);
                        if (defaultGroup && delGroup) {
                            defaultGroup.fundCodes = [...new Set([...defaultGroup.fundCodes, ...delGroup.fundCodes])];
                            appData.groups = appData.groups.filter(g => g.id !== gid);
                            if (currentGroupId === gid) currentGroupId = 'default';
                            saveAppData(); renderGroups(); renderCards();
                        }
                    }
                }
            });
        });

        document.getElementById('addGroupBtn')?.addEventListener('click', () => {
            const newName = prompt('新分组名称', '新分组');
            if (newName?.trim()) {
                const newId = 'group_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                appData.groups.push({ id: newId, name: newName.trim(), fundCodes: [] });
                saveAppData(); renderGroups();
            }
        });
    }

    // ---------- 基金数据加载（优化：只保留最近120点）----------
    async function loadFundData(code, forceRefresh = false) {
        if (!forceRefresh && appData.fundsCache[code]?.netWorth) {
            return appData.fundsCache[code];
        }

        return new Promise((resolve, reject) => {
            const GLOBAL_KEYS = ['Data_netWorthTrend', 'fund_name', 'fS_name'];
            GLOBAL_KEYS.forEach(key => delete window[key]);

            const script = document.createElement('script');
            script.src = `https://fund.eastmoney.com/pingzhongdata/${code}.js?t=${Date.now()}`;
            script.charset = 'utf-8';
            const timeoutId = setTimeout(() => { script.remove(); reject(new Error('超时')); }, 10000);

            script.onload = () => {
                setTimeout(() => {
                    clearTimeout(timeoutId);
                    let netWorth = null;
                    if (window.Data_netWorthTrend && Array.isArray(window.Data_netWorthTrend)) {
                        // 原始数据可能无序，先转为对象数组
                        netWorth = window.Data_netWorthTrend.map(item => ({ x: item.x, y: item.y }));
                        // 按日期升序（旧到新）
                        netWorth.sort((a, b) => new Date(a.x) - new Date(b.x));
                        // 只保留最近 MAX_HISTORY_POINTS 个点
                        if (netWorth.length > MAX_HISTORY_POINTS) {
                            netWorth = netWorth.slice(-MAX_HISTORY_POINTS);
                        }
                    }
                    const name = window.fund_name || window.fS_name || code;
                    GLOBAL_KEYS.forEach(key => delete window[key]);
                    script.remove();

                    if (netWorth && netWorth.length > 0) {
                        const fundInfo = { code, name, netWorth, error: false };
                        appData.fundsCache[code] = fundInfo;
                        resolve(fundInfo);
                    } else {
                        reject(new Error('无净值'));
                    }
                }, 60);
            };
            script.onerror = () => {
                clearTimeout(timeoutId);
                GLOBAL_KEYS.forEach(key => delete window[key]);
                script.remove();
                reject(new Error('网络错误'));
            };
            document.head.appendChild(script);
        });
    }

    // 计算15日内最大跌幅（假设netWorth已升序）
    function computeMaxDrop(netWorth, days = 15) {
        if (!netWorth || netWorth.length < 2) return null;
        const latest = netWorth[netWorth.length - 1].y;
        const startIdx = Math.max(0, netWorth.length - 1 - days);
        let minReturn = 0;
        for (let i = startIdx; i < netWorth.length - 1; i++) {
            const ret = (latest / netWorth[i].y - 1) * 100;
            if (ret < minReturn) minReturn = ret;
        }
        return minReturn;
    }

    // 获取最新净值信息
    function getLatestInfo(netWorth) {
        if (!netWorth || netWorth.length === 0) return { date: '', value: 0, change: null };
        const latest = netWorth[netWorth.length - 1];
        const prev = netWorth.length > 1 ? netWorth[netWorth.length - 2] : null;
        const change = prev ? ((latest.y / prev.y) - 1) * 100 : null;
        return { date: latest.x, value: latest.y, change };
    }

    // 计算周期涨幅（netWorth升序）
    function computeRates(netWorth) {
        if (!netWorth || netWorth.length === 0) return PERIODS.map(() => null);
        const latest = netWorth[netWorth.length - 1].y;
        return PERIODS.map(days => {
            const idx = netWorth.length - 1 - days;
            if (idx >= 0) {
                return ((latest / netWorth[idx].y) - 1) * 100;
            }
            return null;
        });
    }

    // 渲染卡片
    async function renderCards() {
        const container = document.getElementById('cardContainer');
        if (!container) return;

        const currentGroup = appData.groups.find(g => g.id === currentGroupId);
        if (!currentGroup) return;

        const fundCodes = currentGroup.fundCodes;
        if (fundCodes.length === 0) {
            container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div style="font-size:48px;">📂</div><p>该分组暂无基金</p></div>';
            return;
        }

        let html = '';
        for (let code of fundCodes) {
            let cached = appData.fundsCache[code];
            if (!cached) {
                cached = { code, name: '加载中...', netWorth: null, error: false };
                loadFundData(code).then(() => renderCards()).catch(() => {
                    appData.fundsCache[code] = { code, name: '加载失败', netWorth: null, error: true };
                    renderCards();
                });
            }

            const name = cached.name || code;
            const netWorth = cached.netWorth;
            const isError = cached.error;
            const isLoading = !isError && !netWorth;

            let riskFlag = false;
            if (netWorth) {
                const maxDrop = computeMaxDrop(netWorth, 15);
                if (maxDrop !== null && maxDrop <= RISK_THRESHOLD) riskFlag = true;
            }

            let latestHtml = '';
            if (netWorth) {
                const { date, value, change } = getLatestInfo(netWorth);
                const changeStr = change !== null ? (change > 0 ? `+${change.toFixed(2)}%` : `${change.toFixed(2)}%`) : '--';
                const changeClass = change > 0 ? 'positive' : (change < 0 ? 'negative' : '');
                latestHtml = `<div class="latest-info"><span class="date">${date}</span><span class="value">${value.toFixed(4)} <span class="change ${changeClass}">${changeStr}</span></span></div>`;
            } else if (isLoading) {
                latestHtml = `<div class="latest-info">加载中...</div>`;
            }

            let ratesHtml = '';
            if (netWorth) {
                const rates = computeRates(netWorth);
                let items = '';
                PERIODS.forEach((period, idx) => {
                    const val = rates[idx];
                    let valueStr = '——', cls = 'neutral';
                    if (val !== null) {
                        valueStr = val.toFixed(2) + '%';
                        cls = val > 0 ? 'positive' : (val < 0 ? 'negative' : 'neutral');
                    }
                    items += `<div class="rate-item"><div class="rate-label">${period}D</div><div class="rate-value ${cls}">${valueStr}</div></div>`;
                });
                ratesHtml = `<div class="rates-grid">${items}</div>`;
            } else if (isError) {
                ratesHtml = `<div class="error-placeholder">加载失败</div>`;
            }

            const riskTag = riskFlag ? '<span class="risk-tag">⚠️ 跌幅大</span>' : '';

            html += `
                <div class="card ${riskFlag ? 'risk-highlight' : ''}" data-code="${code}">
                    <div class="card-header">
                        <div class="fund-title" title="${name}">${name.length > 18 ? name.slice(0,16)+'…' : name}</div>
                        <span class="fund-code">${code}</span>
                        <button class="delete-btn" data-code="${code}" title="删除">✕</button>
                    </div>
                    ${latestHtml}
                    ${ratesHtml}
                    ${riskTag}
                </div>
            `;
        }

        container.innerHTML = html;

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const code = btn.getAttribute('data-code');
                if (code) deleteFund(code);
            });
        });

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-btn')) return;
                const code = card.getAttribute('data-code');
                if (code) showFundChart(code);
            });
        });
    }

    function deleteFund(code) {
        const group = appData.groups.find(g => g.id === currentGroupId);
        if (group) {
            group.fundCodes = group.fundCodes.filter(c => c !== code);
            saveAppData();
            renderCards();
            renderGroups();
        }
    }

    async function addFund() {
        const addBtn = document.getElementById('addFundBtn');
        const codeInput = document.getElementById('fundCodeInput');
        const groupSelect = document.getElementById('groupSelect');
        const code = codeInput.value.trim();
        if (!/^\d+$/.test(code)) { alert('请输入纯数字基金代码'); return; }

        const targetGroupId = groupSelect.value;
        const targetGroup = appData.groups.find(g => g.id === targetGroupId);
        if (!targetGroup) return;

        const exists = appData.groups.some(g => g.fundCodes.includes(code));
        if (exists) { alert('该基金已存在于某个分组'); return; }

        try {
            addBtn.disabled = true;
            addBtn.textContent = '验证中...';
            await loadFundData(code, true);
        } catch (e) {
            alert(`无效基金代码: ${e.message}`);
            addBtn.disabled = false;
            addBtn.textContent = '➕ 添加';
            return;
        } finally {
            addBtn.disabled = false;
            addBtn.textContent = '➕ 添加';
        }

        targetGroup.fundCodes.push(code);
        saveAppData();
        codeInput.value = '';
        await renderCards();
        renderGroups();
    }

    // 曲线模态框
    function showFundChart(code) {
        const fund = appData.fundsCache[code];
        if (!fund?.netWorth) { alert('数据未就绪'); return; }
        currentModalFund = fund;
        document.getElementById('modalFundName').textContent = fund.name + ' (' + code + ')';
        document.getElementById('chartModal').classList.add('active');
        drawChart(15);
    }

    function drawChart(days) {
        if (!currentModalFund?.netWorth) return;
        const netWorth = currentModalFund.netWorth; // 已是升序
        const slice = netWorth.slice(-days);
        const labels = slice.map(d => d.x);
        const startY = slice[0]?.y || 1;
        const returns = slice.map(d => ((d.y / startY) - 1) * 100);

        const ctx = document.getElementById('fundChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ label: '累计涨跌率 (%)', data: returns, borderColor: '#3b82f6', tension: 0.1 }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // 初始化
    async function init() {
        if (s3) {
            try {
                const cloudData = await loadFromCloud();
                if (cloudData?.groups) {
                    appData = cloudData;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
                }
            } catch (e) { console.warn('cloud load failed', e); }
        }
        loadAppData();

        renderGroups();
        await renderCards();

        document.getElementById('addFundBtn').addEventListener('click', addFund);
        document.getElementById('syncToCloudBtn').addEventListener('click', async () => {
            const status = document.getElementById('syncStatus');
            status.textContent = '同步中...';
            try {
                await saveToCloud(appData);
                status.textContent = '✅ 同步成功';
                setTimeout(() => status.textContent = '', 2000);
            } catch (e) {
                status.textContent = '❌ 失败';
                setTimeout(() => status.textContent = '', 2000);
            }
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('chartModal').classList.remove('active');
        });
        document.getElementById('chartModal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                document.getElementById('chartModal').classList.remove('active');
            }
        });

        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                drawChart(parseInt(btn.dataset.days, 10));
            });
        });

        document.getElementById('fundCodeInput').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });
    }

    init();
})();
</script>
