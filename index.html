<body>
<div class="container">
    <div class="header">
        <h1>📈 基金分组看板 <span>板块下拉修复</span></h1>
        <div class="sub">基金名称完整显示 · 15日最大累计跌幅 · 手动选择板块</div>

            <div class="group-tabs" id="groupTabs"></div>
            <div class="sort-controls">
                <div class="view-toggle" id="viewToggle">
                    <button class="view-btn active" data-view="card">卡片</button>
                    <button class="view-btn" data-view="list">列表</button>
                </div>
                <button class="sort-direction-btn active" id="sortDirectionBtn">降序</button>
                <select class="sort-rule-select" id="sortRuleSelect">
                    <option value="daily">日涨跌幅</option>
                    <option value="3">3日</option>
                    <option value="5">5日</option>
                    <option value="7">7日</option>
                    <option value="10">10日</option>
                    <option value="15">15日</option>
                    <option value="20">20日</option>
                </select>
            </div>
        </div>

        <!-- 添加区域 -->
        <div class="add-area">
            <div class="search-wrapper">
                <div class="input-wrapper">
                    <input type="text" id="fundSearchInput" placeholder="基金代码 或 名称关键字" autocomplete="off">
                </div>
                <div class="suggestion-dropdown" id="suggestionDropdown"></div>
            </div>
            <select id="groupSelect" class="group-select"></select>
            <button class="add-btn" id="addFundBtn">➕ 添加</button>
        </div>
    </div>

    <!-- 左右布局主区域 -->
    <div class="main-dashboard">
        <div class="left-panel">
            <div id="cardContainer" class="card-grid"></div>
        </div>
        <div class="right-panel">
            <h3>
                分组平均涨跌
                <div class="group-summary-sort" id="groupSummarySort">
                    <span data-dir="desc" class="active">降序</span>
                    <span data-dir="asc">升序</span>
                </div>

<script>
(function() {
    // ========== 核心配置 ==========
    const STORAGE_KEY = 'funds_app_data_v3';
    const PERIODS = [3, 5, 7, 10, 15, 20];
    const DROP_THRESHOLD = -8.5;
    const DAILY_RISK_THRESHOLD = -5.0;
    const MAX_HISTORY_POINTS = 120;
    const MAX_DROP_PERIOD = 15;

    const R2_CONFIG = {
        bucketName: 'fund-list-app',
        accessKeyId: 'df123c57ee036af018c3f6f801fae726',
        secretAccessKey: 'c38798027a0815dae26376089d4f15eef26e2eb66487b4cf9346a17f26ff29e3',
        endpoint: 'https://d6ac8bc5f7ebda3a5ac875c4346917fe.r2.cloudflarestorage.com'
    };

    let s3 = null;
    try {
        s3 = new AWS.S3({
            endpoint: R2_CONFIG.endpoint,
            accessKeyId: R2_CONFIG.accessKeyId,
            secretAccessKey: R2_CONFIG.secretAccessKey,
            s3ForcePathStyle: true,
            signatureVersion: 'v4',
            region: 'auto'
        });
    } catch (e) { console.warn('S3 init failed', e); }

    let appData = { groups: [], fundsCache: {} };
    let currentGroupId = 'default';
    let chartInstance = null;
    let currentModalFund = null;

    let sortDirection = 'desc';
    let sortRule = 'daily';
    let viewMode = 'card';
    let groupSummarySortDir = 'desc';

    const UTC_OFFSET = 28800000;

    // ---------- 基金全量列表 ----------
    let masterFundList = [];
    let masterListLoaded = false;
    let masterListLoading = null;

    // 预定义板块列表（可扩展）
    const SECTOR_LIST = [
        '医疗', '医药', '健康', '生物', '中药',
        '新能源', '光伏', '风电', '锂电', '电池', '能源',
        '环保', '环境',
        '科技', '信息', '软件', '半导体', '芯片', '电子', '计算机', '人工智能', '大数据', '云计算',
        '高端制造', '制造', '工业', '机械', '设备',
        '军工', '航天', '国防',
        '消费', '食品', '饮料', '白酒', '酒',
        '金融', '银行', '保险', '证券', '券商',
        '地产', '房地产',

        '文体', '传媒', '游戏', '娱乐', '影视',
        '互联网', '移动互联', '电商', '物流', '快递',
        '黄金', '珠宝', '商品', '贵金属'
    ];

    function loadMasterFundList(force = false) {
        if (masterListLoading) return masterListLoading;
        try {
            const cached = localStorage.getItem('fund_master_list');
            const cachedTime = localStorage.getItem('fund_master_list_time');
            if (!force && cached && cachedTime && (Date.now() - parseInt(cachedTime) < 86400000)) {
                masterFundList = JSON.parse(cached);
                masterListLoaded = true;
                return Promise.resolve(masterFundList);
            }
        } catch (e) { console.warn('读取缓存失败', e); }

        masterListLoading = new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = `https://fund.eastmoney.com/js/fundcode_search.js?t=${Date.now()}`;
            script.charset = 'utf-8';
            const timeout = setTimeout(() => {
                script.remove();
                reject(new Error('加载基金列表超时'));
                masterListLoading = null;
            }, 15000);
            script.onload = () => {
                clearTimeout(timeout);
                if (window.r && Array.isArray(window.r)) {
                    try {
                        masterFundList = window.r.map(item => ({
                            code: item[0],
                            short: item[1],
                            name: item[2],
                            type: item[3]
                        }));
                        localStorage.setItem('fund_master_list', JSON.stringify(masterFundList));
                        localStorage.setItem('fund_master_list_time', Date.now().toString());
                        masterListLoaded = true;
                        delete window.r;
                        script.remove();
                        resolve(masterFundList);
                    } catch (e) { reject(e); }
                } else {
                    reject(new Error('window.r 不存在'));
                }
                masterListLoading = null;
            };
            script.onerror = () => {
                clearTimeout(timeout);
                reject(new Error('加载基金列表网络错误'));
                script.remove();
                masterListLoading = null;
            };
            document.head.appendChild(script);
        }).catch(err => {
            console.warn('加载基金列表失败', err);
            masterFundList = [];
            return [];
        });
        return masterListLoading;
    }

    // ========== 工具函数 ==========
    function showToast(message) {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:8px 16px;border-radius:8px;font-size:0.85rem;z-index:9999;animation:fadeInOut 2s ease;`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    function checkFundDuplicate(groupId, fundCode) {
        const group = appData.groups.find(g => g.id === groupId);
        return group ? group.fundCodes.includes(fundCode) : false;
    }
    function getAllFundCodes() {
        const allCodes = [];
        appData.groups.forEach(group => {
            if (group.id !== 'default') allCodes.push(...group.fundCodes);
        });
        return [...new Set(allCodes)];
    }
    function formatDate(dateInput) {
        if (!dateInput) return '';
        if (typeof dateInput === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dateInput)) return dateInput;
        let ts = Number(dateInput);
        if (!isNaN(ts) && ts > 0) {
            const beijing = ts + UTC_OFFSET;
            const d = new Date(beijing);
            if (!isNaN(d.getTime())) {
                return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
            }
        }
        const d = new Date(dateInput);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function computeRate(netWorth, days) {
        if (!netWorth || netWorth.length < days) return null;
        return ((netWorth[netWorth.length-1].y - netWorth[netWorth.length-days].y) / netWorth[netWorth.length-days].y * 100).toFixed(2);
    }
    function compute15DayChange(netWorth, days) {
        if (!netWorth || netWorth.length < days) return null;
        const slice = netWorth.slice(-days);
        return ((slice[slice.length-1].y - slice[0].y) / slice[0].y * 100).toFixed(2);
    }
    function computeMaxDropInPeriod(netWorth, days) {
        if (!netWorth || netWorth.length < days) return null;
        const slice = netWorth.slice(-days);
        const latest = slice[slice.length-1].y;
        let min = Infinity;
        for (let i = 0; i < slice.length-1; i++) {
            const rate = (latest - slice[i].y) / slice[i].y * 100;
            if (rate < min) min = rate;
        }
        return min === Infinity ? null : min.toFixed(2);
    }
    function getLatestInfo(netWorth) {
        if (!netWorth || !netWorth.length) return { date: '', value: '', change: null };
        const latest = netWorth[netWorth.length-1];
        const prev = netWorth.length>1 ? netWorth[netWorth.length-2] : null;
        const change = prev ? ((latest.y - prev.y)/prev.y*100).toFixed(2) : null;
        return { date: formatDate(latest.x), value: latest.y.toFixed(4), change };
    }
    function sortFundCodes(fundCodes) {
        const codes = [...fundCodes];
        codes.sort((a,b) => {
            const fa = appData.fundsCache[a], fb = appData.fundsCache[b];
            if (!fa || !fa.netWorth) return 1;
            if (!fb || !fb.netWorth) return -1;
            let va, vb;
            if (sortRule === 'daily') {
                va = parseFloat(getLatestInfo(fa.netWorth).change) || 0;
                vb = parseFloat(getLatestInfo(fb.netWorth).change) || 0;
            } else {
                va = parseFloat(computeRate(fa.netWorth, parseInt(sortRule))) || 0;
                vb = parseFloat(computeRate(fb.netWorth, parseInt(sortRule))) || 0;
            }
            return sortDirection === 'asc' ? va - vb : vb - va;
        });
        return codes;
    }

    // ========== 数据存储 ==========
    function loadAppData() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                if (parsed && Array.isArray(parsed.groups)) {
                    appData = parsed;
                    const defaultGroup = appData.groups.find(g => g.id === 'default');
                    if (defaultGroup && defaultGroup.name === '默认') defaultGroup.name = '全部';
                    if (!appData.fundsCache) appData.fundsCache = {};
                } else {
                    const oldCodes = Array.isArray(parsed) ? parsed : [];
                    appData = { groups: [{ id:'default', name:'全部', fundCodes:[] }], fundsCache:{} };
                    if (oldCodes.length > 0) {
                        appData.groups.push({ id:'group_'+Date.now(), name:'我的基金', fundCodes:oldCodes });
                    }
                }
            } else {
                appData = { groups: [{ id:'default', name:'全部', fundCodes:[] }], fundsCache:{} };
            }
        } catch (e) {
            appData = { groups: [{ id:'default', name:'全部', fundCodes:[] }], fundsCache:{} };
        }
        if (!appData.fundsCache) appData.fundsCache = {};
        const defaultGroup = appData.groups.find(g => g.id === 'default');
        if (defaultGroup) defaultGroup.fundCodes = getAllFundCodes();
    }
    function saveAppData() {
        const defaultGroup = appData.groups.find(g => g.id === 'default');
        if (defaultGroup) defaultGroup.fundCodes = getAllFundCodes();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        if (s3) saveToCloud(appData).catch(err => console.warn('cloud sync failed', err));
    }
    async function loadFromCloud() {
        if (!s3) throw new Error('S3未初始化');
        const params = { Bucket: R2_CONFIG.bucketName, Key: 'funds_app_data_v3.json' };
        try {
            const data = await s3.getObject(params).promise();
            return JSON.parse(data.Body.toString('utf-8'));
        } catch (e) {
            if (e.code === 'NoSuchKey') return null;
            throw e;
        }
    }
    async function saveToCloud(data) {
        if (!s3) return;
        await s3.putObject({
            Bucket: R2_CONFIG.bucketName,
            Key: 'funds_app_data_v3.json',
            Body: JSON.stringify(data),
            ContentType: 'application/json'
        }).promise();
    }

    // ========== 分组平均值及风险标记 ==========
    function calculateGroupAvgChange(groupId) {
        const group = appData.groups.find(g => g.id === groupId);
        if (!group || group.id === 'default') return null;
        const codes = group.fundCodes;
        let sum = 0, count = 0;
        codes.forEach(code => {
            const fund = appData.fundsCache[code];
            if (fund && fund.netWorth) {
                const change = getLatestInfo(fund.netWorth).change;
                if (change !== null) {
                    sum += parseFloat(change);
                    count++;
                }
            }
        });
        if (count === 0) return null;
        return (sum / count).toFixed(2);
    }
    function has15DayRisk(groupId) {
        const group = appData.groups.find(g => g.id === groupId);
        if (!group || group.id === 'default') return false;
        return group.fundCodes.some(code => {
            const cached = appData.fundsCache[code];
            if (!cached || !cached.netWorth) return false;
            const change15D = compute15DayChange(cached.netWorth, MAX_DROP_PERIOD);
            return change15D !== null && parseFloat(change15D) <= DROP_THRESHOLD;
        });
    }
    function hasDailyRisk(groupId) {
        const group = appData.groups.find(g => g.id === groupId);
        if (!group || group.id === 'default') return false;
        return group.fundCodes.some(code => {
            const cached = appData.fundsCache[code];
            if (!cached || !cached.netWorth) return false;
            const change = getLatestInfo(cached.netWorth).change;
            return change !== null && parseFloat(change) <= DAILY_RISK_THRESHOLD;
        });
    }

    // ========== 渲染右侧分组板块 ==========
    function renderGroupSummaryPanel() {
        const listEl = document.getElementById('groupSummaryList');
        if (!listEl) return;
        const groups = appData.groups.filter(g => g.id !== 'default');
        const items = groups.map(g => {
            const avg = calculateGroupAvgChange(g.id);
            const has15 = has15DayRisk(g.id);
            const hasDaily = hasDailyRisk(g.id);
            return { id: g.id, name: g.name, avg, has15, hasDaily };
        }).filter(item => item.avg !== null);
        items.sort((a,b) => {
            const va = parseFloat(a.avg) || 0;
            const vb = parseFloat(b.avg) || 0;
            return groupSummarySortDir === 'desc' ? vb - va : va - vb;
        });
        let html = '';
        items.forEach(item => {
            const activeClass = item.id === currentGroupId ? 'active' : '';
            const valueClass = parseFloat(item.avg) >= 0 ? 'positive' : 'negative';
            let badgeHtml = '';
            if (item.has15) badgeHtml += '<span class="warning-badge">!</span>';
            if (item.hasDaily) badgeHtml += '<span class="green-heart">💚</span>';
            if (badgeHtml) {
                badgeHtml = `<span class="group-summary-badge">${badgeHtml}</span>`;
            }
            html += `
                <div class="group-summary-item ${activeClass}" data-group-id="${item.id}">
                    <span class="group-summary-name">
                        ${item.name}
                        ${badgeHtml}
                    </span>
                    <span class="group-summary-value ${valueClass}">${item.avg}%</span>
                </div>
            `;
        });
        if (items.length === 0) {
            html = `<div style="padding:16px;text-align:center;color:#9aa9c2;">暂无分组数据</div>`;
        }
        listEl.innerHTML = html;
        listEl.querySelectorAll('.group-summary-item').forEach(el => {
            el.addEventListener('click', () => {
                const gid = el.dataset.groupId;
                if (gid) {
                    currentGroupId = gid;
                    renderGroups();
                    renderCards();
                    renderGroupSummaryPanel();
                }
            });
        });
    }

    // ========== 分组渲染（带重命名按钮） ==========
    function renderGroups() {
        const tabsContainer = document.getElementById('groupTabs');
        const groupSelect = document.getElementById('groupSelect');
        if (!tabsContainer) return;
        let tabsHtml = '', optionsHtml = '';
        const nonDefaultGroups = [];
        appData.groups.forEach(group => {
            const isDefault = group.id === 'default';
            const has15 = isDefault ? false : has15DayRisk(group.id);
            const hasDaily = isDefault ? false : hasDailyRisk(group.id);
            const fundCount = group.fundCodes.length;
            const activeClass = group.id === currentGroupId ? 'active' : '';
            const warningBadge = has15 ? '<span class="warning-badge">!</span>' : '';
            const greenHeart = hasDaily ? '<span class="green-heart">💚</span>' : '';
            const countSpan = `<span class="fund-count">${fundCount}</span>`;
            const deleteBtn = isDefault ? '' : `<button class="delete-group" data-group-id="${group.id}">✕</button>`;
            const renameBtn = isDefault ? '' : `<button class="rename-group" data-group-id="${group.id}" title="重命名">✏️</button>`;
            tabsHtml += `<div class="group-tab ${activeClass}" data-group-id="${group.id}">${group.name} ${countSpan} ${warningBadge} ${greenHeart} ${deleteBtn} ${renameBtn}</div>`;
            if (!isDefault) {
                nonDefaultGroups.push(group);
                optionsHtml += `<option value="${group.id}">${group.name}</option>`;
            }
        });
        tabsHtml += `<button class="add-group-btn" id="addGroupBtn">+</button>`;
        tabsContainer.innerHTML = tabsHtml;
        if (groupSelect) {
            groupSelect.innerHTML = optionsHtml;
            if (currentGroupId !== 'default' && nonDefaultGroups.some(g => g.id === currentGroupId)) {
                groupSelect.value = currentGroupId;
            } else if (nonDefaultGroups.length > 0) {
                groupSelect.value = nonDefaultGroups[0].id;
            }
        }

        document.querySelectorAll('.group-tab[data-group-id]').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-group') || e.target.classList.contains('rename-group')) return;
                const gid = el.getAttribute('data-group-id');
                if (gid) { 
                    currentGroupId = gid; 
                    renderGroups(); 
                    renderCards(); 
                    renderGroupSummaryPanel();
                }
            });
        });

        document.querySelectorAll('.delete-group').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const gid = btn.getAttribute('data-group-id');
                if (gid && gid !== 'default') {
                    if (confirm(`确定删除该分组吗？组内基金将被一并移除`)) {
                        appData.groups = appData.groups.filter(g => g.id !== gid);
                        if (currentGroupId === gid) currentGroupId = 'default';
                        saveAppData(); 
                        renderGroups(); 
                        renderCards();
                        renderGroupSummaryPanel();
                        showToast('分组已删除');
                    }
                }
            });
        });

        document.querySelectorAll('.rename-group').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const gid = btn.getAttribute('data-group-id');
                const group = appData.groups.find(g => g.id === gid);
                if (!group) return;
                const newName = prompt('请输入新的分组名称', group.name);
                if (!newName || newName.trim() === '') return;
                const trimmed = newName.trim();
                const exists = appData.groups.some(g => g.id !== gid && g.name === trimmed);
                if (exists) {
                    showToast('分组名称已存在，请使用其他名称');
                    return;
                }
                group.name = trimmed;
                saveAppData();
                renderGroups();
                renderGroupSummaryPanel();
                showToast('分组已重命名');
            });
        });

        document.getElementById('addGroupBtn')?.addEventListener('click', () => {
            const newName = prompt('新分组名称', '新分组');
            if (newName?.trim()) {
                const isNameExists = appData.groups.some(g => g.name.trim() === newName.trim());
                if (isNameExists) { showToast('分组名称已存在'); return; }
                const newId = 'group_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
                appData.groups.push({ id: newId, name: newName.trim(), fundCodes: [] });
                saveAppData(); 
                renderGroups();
                renderGroupSummaryPanel();
                showToast('分组创建成功');
            }
        });
    }

    // ========== 板块下拉菜单（修复版） ==========
    function attachSectorDropdown(cardElement, code) {
        const fund = appData.fundsCache[code];
        if (!fund) return;

        let wrapper = cardElement.querySelector('.fund-code-wrapper');
        if (!wrapper) return;

        // 移除已存在的板块选择器（防止重复）
        let existingSelector = wrapper.querySelector('.sector-selector');
        if (existingSelector) existingSelector.remove();

        // 创建“+板块”按钮容器
        const sectorWrapper = document.createElement('span');
        sectorWrapper.className = 'sector-selector';
        const btnSpan = document.createElement('span');
        btnSpan.className = 'sector-tag';
        btnSpan.style.background = '#eef2f9';
        btnSpan.style.color = '#4b587c';
        btnSpan.textContent = '+ 板块';
        sectorWrapper.appendChild(btnSpan);

        // 创建下拉菜单
        const dropdown = document.createElement('div');
        dropdown.className = 'sector-dropdown';
        SECTOR_LIST.forEach(sector => {
            const item = document.createElement('div');
            item.className = 'sector-dropdown-item';
            item.textContent = sector;
            item.onclick = (e) => {
                e.stopPropagation();
                let selected = fund.sectors || [];
                if (selected.includes(sector)) {
                    selected = selected.filter(s => s !== sector);
                } else {
                    if (selected.length >= 2) {
                        showToast('最多只能选择两个板块');
                        return;
                    }
                    selected.push(sector);
                }
                fund.sectors = selected;
                saveAppData();
                // 刷新卡片上的板块标签（不重建整个卡片）
                renderCardSectors(cardElement, fund);
                dropdown.classList.remove('active');
            };
            dropdown.appendChild(item);
        });
        sectorWrapper.appendChild(dropdown);

        // 点击按钮切换下拉菜单
        btnSpan.onclick = (e) => {
            e.stopPropagation();
            // 关闭其他所有下拉菜单
            document.querySelectorAll('.sector-dropdown.active').forEach(d => d.classList.remove('active'));
            dropdown.classList.toggle('active');
        };

        // 将按钮添加到 wrapper 末尾
        wrapper.appendChild(sectorWrapper);

        // 渲染已有的板块标签
        renderCardSectors(cardElement, fund);
    }

    function renderCardSectors(cardElement, fund) {
        const wrapper = cardElement.querySelector('.fund-code-wrapper');
        if (!wrapper) return;
        // 移除所有现有的板块标签（不包括+按钮本身）
        const existingTags = wrapper.querySelectorAll('.sector-tag:not(.sector-selector .sector-tag)');
        existingTags.forEach(el => el.remove());

        if (fund.sectors && fund.sectors.length > 0) {
            fund.sectors.forEach(s => {
                const tag = document.createElement('span');
                tag.className = 'sector-tag';
                tag.textContent = s;
                tag.onclick = (e) => {
                    e.stopPropagation();
                    fund.sectors = fund.sectors.filter(ss => ss !== s);
                    saveAppData();
                    tag.remove();
                };
                // 插入到+按钮之前
                const selector = wrapper.querySelector('.sector-selector');
                if (selector) {
                    wrapper.insertBefore(tag, selector);
                } else {
                    wrapper.appendChild(tag);
                }
            });
        }
    }

        }

                if (!targetGroupId) { showToast('请选择目标分组'); return; }

                appData.groups.forEach(group => {
                    if (group.id !== 'default' && group.fundCodes.includes(code)) {
                        group.fundCodes = group.fundCodes.filter(c => c !== code);
                    }
                });
                const targetGroup = appData.groups.find(g => g.id === targetGroupId);
                if (targetGroup) targetGroup.fundCodes.push(code);

                renderGroups();
                renderCards();

    // ========== 基金数据加载 ==========
    async function loadFundData(code, forceRefresh = false) {
        if (!forceRefresh && appData.fundsCache[code]?.netWorth) {
            return appData.fundsCache[code];
        }
        renderLoadingCard(code);

        return new Promise((resolve, reject) => {
            const GLOBAL_KEYS = ['Data_netWorthTrend','fund_name','fS_name','fund_manager','fund_asset','fund_stockportfolio'];
            GLOBAL_KEYS.forEach(k => delete window[k]);

            const script = document.createElement('script');
            script.src = `https://fund.eastmoney.com/pingzhongdata/${code}.js?t=${Date.now()}`;
            script.charset = 'utf-8';
            const timeoutId = setTimeout(() => { 
                script.remove(); 
                reject(new Error('超时')); 
                updateCardError(code);
            }, 10000);

            script.onload = async () => {
                setTimeout(async () => {
                    clearTimeout(timeoutId);
                    let netWorth = null;
                    if (window.Data_netWorthTrend && Array.isArray(window.Data_netWorthTrend)) {
                        netWorth = window.Data_netWorthTrend.map(item => ({ x: item.x, y: item.y }));
                        netWorth.sort((a,b) => new Date(a.x).getTime() - new Date(b.x).getTime());
                        if (netWorth.length > MAX_HISTORY_POINTS) netWorth = netWorth.slice(-MAX_HISTORY_POINTS);
                    }
                    const name = window.fund_name || window.fS_name || code;
                    
                    const manager = window.fund_manager || null;
                    const asset = window.fund_asset || null;
                    const stock = window.fund_stockportfolio || null;
                    
                    GLOBAL_KEYS.forEach(key => delete window[key]);
                    script.remove();

                    if (netWorth && netWorth.length > 0) {
                        const fundInfo = { code, name, netWorth, error: false, manager, asset, stock, sectors: [] };
                        appData.fundsCache[code] = fundInfo;
                        
                        // 异步加载持仓数据
                        loadFundHoldings(code).then(holdings => {
                            appData.fundsCache[code].holdings = holdings;
                            if (currentModalFund && currentModalFund.code === code) {
                                renderFundHoldings();
                            }
                        }).catch(err => console.warn(`获取${code}持仓失败`, err));
                        
                        resolve(fundInfo);
                        renderCards();
                        renderGroupSummaryPanel();
                    } else {
                        reject(new Error('无净值'));
                        updateCardError(code);
                    }
                }, 200);
            };
            script.onerror = () => {
                clearTimeout(timeoutId);
                GLOBAL_KEYS.forEach(key => delete window[key]);
                script.remove();
                reject(new Error('网络错误'));
                updateCardError(code);
            };
            document.head.appendChild(script);
        });
    }

    function renderLoadingCard(code) {}
    function updateCardError(code) {
        appData.fundsCache[code] = { code, name: code, error: true };
        renderCards();
        renderGroupSummaryPanel();
    }

    // ========== 基金持仓获取（参考附件代码） ==========
    async function loadFundHoldings(code) {
        try {
            const holdings = await fetchBaiduHoldings(code);
            if (holdings && holdings.length > 0) return holdings;
        } catch (e) {
            console.warn('百度持仓失败，尝试东财', e);
        }
        try {
            const holdings = await fetchEastMoneyHoldings(code);
            return holdings;
        } catch (e) {
            console.warn('东财持仓也失败', e);
            return [];
        }
    }

    async function fetchBaiduHoldings(code) {
        const url = `https://gushitong.baidu.com/opendata?resource_id=5803&query=${code}&new_need_di=1&source=qieman`;
        return new Promise((resolve, reject) => {
            const callbackName = `baidu_holdings_${code}_${Date.now()}`;
            const timeout = setTimeout(() => {
                cleanup();
                reject(new Error('百度JSONP超时'));
            }, 10000);
            const cleanup = () => {
                clearTimeout(timeout);
                delete window[callbackName];
                const script = document.getElementById(`script_${callbackName}`);
                if (script) script.remove();
            };
            window[callbackName] = (data) => {
                try {
                    const result = data?.Result?.[0];
                    const tabs = result?.DisplayData?.resultData?.tplData?.result?.content?.tabs;
                    if (!tabs) { cleanup(); reject(new Error('无tabs')); return; }
                    const posTab = tabs.find(t => t.type === 'position') || tabs[0];
                    const heavyStock = posTab?.content?.heavyStock?.body;
                    if (!heavyStock || !Array.isArray(heavyStock)) { cleanup(); reject(new Error('无持仓数据')); return; }
                    const holdings = heavyStock.map(item => ({
                        name: item.name || '',
                        code: item.code || '',
                        ratio: parseFloat(item.positionProportion?.replace('%', '')) || 0
                    })).filter(h => h.code && h.name && h.ratio > 0).slice(0, 10);
                    cleanup();
                    resolve(holdings);
                } catch (err) {
                    cleanup();
                    reject(err);
                }
            };
            const script = document.createElement('script');
            script.id = `script_${callbackName}`;
            script.src = `${url}&callback=${callbackName}`;
            script.onerror = () => {
                cleanup();
                reject(new Error('百度JSONP加载失败'));
            };
            document.head.appendChild(script);
        });
    }

    async function fetchEastMoneyHoldings(code) {
        const url = `https://fundf10.eastmoney.com/FundArchivesDatas.aspx?type=jjcc&topline=10&code=${code}&year=&month=&rt=${Date.now()}`;
        return new Promise((resolve, reject) => {
            const callbackName = `eastmoney_holdings_${code}_${Date.now()}`;
            const timeout = setTimeout(() => {
                cleanup();
                reject(new Error('东财JSONP超时'));
            }, 10000);
            const cleanup = () => {
                clearTimeout(timeout);
                delete window[callbackName];
                const script = document.getElementById(`script_${callbackName}`);
                if (script) script.remove();
            };
            window[callbackName] = (data) => {
                try {
                    const html = data?.content || '';
                    const regex = /<td[^>]*>([^<]+)<\/td>/g;
                    const matches = html.match(/<td[^>]*>([^<]+)<\/td>/g);
                    if (!matches) { cleanup(); reject(new Error('解析失败')); return; }
                    const values = matches.map(m => m.replace(/<[^>]+>/g, '').trim());
                    const holdings = [];
                    for (let i = 0; i < Math.min(values.length, 30); i += 4) {
                        if (i+2 < values.length) {
                            holdings.push({
                                code: values[i],
                                name: values[i+1],
                                ratio: parseFloat(values[i+2]) || 0
                            });
                        }
                    }
                    cleanup();
                    resolve(holdings.filter(h => h.code && h.name).slice(0, 10));
                } catch (err) {
                    cleanup();
                    reject(err);
                }
            };
            const script = document.createElement('script');
            script.id = `script_${callbackName}`;
            script.src = `${url}&callback=${callbackName}`;
            script.onerror = () => {
                cleanup();
                reject(new Error('东财JSONP加载失败'));
            };
            document.head.appendChild(script);
        });
    }

    function renderFundChart(days) {

        const ctx = document.getElementById('fundChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        const data = currentModalFund.netWorth.slice(-days);

            type: 'line',
            data: {
                labels: data.map(item => formatDate(item.x)),
                datasets: [{
                    label: '单位净值', data: data.map(item => item.y),
                    borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.05)',
                    borderWidth: 3, tension: 0.2, fill: true, pointRadius: 3,
                    pointBackgroundColor: 'white', pointBorderColor: '#3b82f6'
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { backgroundColor: '#0b1b32', titleColor: '#fff', bodyColor: '#e2e8f0', padding: 10, cornerRadius: 12 } },
                scales: { x: { grid: { display: false }, ticks: { color: '#4b587c' } }, y: { grid: { color: '#e9ecf5' }, ticks: { color: '#4b587c' } } }
            }
        });
    }
    function renderNetWorthTable(days) {
        if (!currentModalFund || !currentModalFund.netWorth) return;
        const container = document.getElementById('netWorthTable');
        document.getElementById('tableTitle').textContent = `最近${days}日净值明细`;
        const data = currentModalFund.netWorth.slice(-days);
        let html = `<table><thead><tr><th>日期</th><th>单位净值</th><th>涨跌额</th><th>涨跌幅</th></tr></thead><tbody>`;
        for (let i = data.length-1; i >= 0; i--) {
            const item = data[i];
            const prev = i>0 ? data[i-1] : null;
            const change = prev ? (item.y - prev.y).toFixed(4) : '--';
            const changeRate = prev ? ((item.y - prev.y)/prev.y*100).toFixed(2) : '--';
            const cls = prev ? (parseFloat(change)>=0 ? 'positive' : 'negative') : '';
            html += `<tr><td>${formatDate(item.x)}</td><td>${item.y.toFixed(4)}</td><td class="${cls}">${change}</td><td class="${cls}">${changeRate!=='--'?changeRate+'%':'--'}</td></tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // ========== 初始化 ==========
    async function init() {
        loadAppData();
        renderGroups();
        renderCards();
        renderGroupSummaryPanel();

        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', function() {

                renderCards();
            });
        });
        document.querySelectorAll('#groupSummarySort span').forEach(span => {
            span.addEventListener('click', function() {
                document.querySelectorAll('#groupSummarySort span').forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                groupSummarySortDir = this.dataset.dir;
                renderGroupSummaryPanel();
            });
        });
        document.getElementById('sortDirectionBtn').addEventListener('click', function() {
            sortDirection = sortDirection === 'desc' ? 'asc' : 'desc';
            this.textContent = sortDirection === 'desc' ? '降序' : '升序';
            this.classList.toggle('active');
            renderCards();
        });
        document.getElementById('sortRuleSelect').addEventListener('change', function() {
            sortRule = this.value;
            renderCards();
        });

        await loadMasterFundList();

        const searchInput = document.getElementById('fundSearchInput');
        const dropdown = document.getElementById('suggestionDropdown');
        let selectedCode = '';
        async function handleSearchInput() {
            const kw = searchInput.value.trim();
            if (kw.length < 2) { dropdown.classList.remove('active'); selectedCode=''; return; }
            if (!masterListLoaded) await loadMasterFundList();
            if (!masterFundList.length) return;
            const lower = kw.toLowerCase();
            const matched = masterFundList.filter(f => f.code.startsWith(kw) || f.name.includes(lower) || f.short.includes(lower)).slice(0,12);
            if (matched.length === 0) { dropdown.classList.remove('active'); return; }
            let html = '';
            matched.forEach(f => {
                html += `<div class="suggestion-item" data-code="${f.code}" data-name="${f.name}"><span class="suggestion-name">${f.name}</span><span><span class="suggestion-code">${f.code}</span><span class="suggestion-type">${f.type||''}</span></span></div>`;
            });
            dropdown.innerHTML = html;
            dropdown.classList.add('active');
        }
        let searchTimer;
        searchInput.addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(handleSearchInput, 300); });
        dropdown.addEventListener('click', (e) => {
            const item = e.target.closest('.suggestion-item');
            if (!item) return;
            selectedCode = item.dataset.code;
            searchInput.value = `${item.dataset.name} (${item.dataset.code})`;
            dropdown.classList.remove('active');
        });
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('active');
        });

        document.getElementById('addFundBtn').addEventListener('click', async () => {
            let code = selectedCode;
            if (!code) {
                const match = searchInput.value.match(/\d{6}/);
                if (match) code = match[0];
            }
            if (!code || !/^\d{6}$/.test(code)) { showToast('请从下拉列表选择正确的基金，或输入6位代码'); return; }
            const targetGroupId = document.getElementById('groupSelect').value;
            if (!targetGroupId) { showToast('请选择分组'); return; }
            if (checkFundDuplicate(targetGroupId, code)) { showToast('该分组已存在此基金'); return; }
            const targetGroup = appData.groups.find(g => g.id === targetGroupId);
            if (targetGroup) {
                targetGroup.fundCodes.push(code);
                saveAppData();
                renderGroups();
                searchInput.value = '';
                selectedCode = '';
                try {
                    await loadFundData(code, true);
                    renderCards();
                    renderGroupSummaryPanel();
                    showToast('基金添加成功');
                } catch (e) { 
                    renderCards(); 
                    renderGroupSummaryPanel();
                    showToast('添加成功，但数据加载失败'); 
                }
            }
        });

        if (s3) {
            try {
                const cloudData = await loadFromCloud();
                if (cloudData) {
                    appData = cloudData;
                    const defaultGroup = appData.groups.find(g => g.id === 'default');
                    if (defaultGroup && defaultGroup.name === '默认') defaultGroup.name = '全部';
                    saveAppData();
                    renderGroups();
                    renderCards();
                    renderGroupSummaryPanel();
                    document.getElementById('syncStatus').textContent = '云端数据已同步';
                }
            } catch (e) { console.warn('Cloud load failed', e); }
        }
        const allCodes = getAllFundCodes();
        for (const code of allCodes) {
            try { await loadFundData(code); } catch (e) { console.warn(`Load ${code} failed`, e); }
        }

        document.getElementById('closeModalBtn')?.addEventListener('click', closeChartModal);
        document.getElementById('chartModal')?.addEventListener('click', (e) => { if (e.target.id === 'chartModal') closeChartModal(); });
        document.getElementById('syncToCloudBtn')?.addEventListener('click', async () => {
            if (!s3) { showToast('云端同步未配置'); return; }
            const statusEl = document.getElementById('syncStatus');
            try {
                statusEl.textContent = '同步中...';
                await saveToCloud(appData);
                statusEl.textContent = '同步成功 ✓';
                showToast('云端同步成功');
            } catch (e) {
                console.error(e);
                statusEl.textContent = '同步失败';
                showToast('云端同步失败');
            }
        });
    }

    init();
})();
</script>
</body>
</html>
