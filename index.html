<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <title>基金看板 · 板块优化+简况修复</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Heiti SC", "Microsoft YaHei", "WenQuanYi Micro Hei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        html, body { 
            background: #f3f5f9; 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
        }
        body {
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { 
            max-width: 1400px; 
            width: 100%;
            margin: 0 auto;
        }
        .header { 
            background: linear-gradient(135deg, #ffffff 0%, #f8faff 100%);
            border-radius: 28px; 
            padding: 20px 20px 24px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); 
            margin-bottom: 20px;
            position: relative;
            overflow: visible !important;
            z-index: 10;
        }
        .header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        }
        h1 { 
            margin: 0 0 8px; 
            font-size: 1.6rem; 
            font-weight: 600; 
            color: #0b1b32; 
            display: flex; 
            gap: 8px; 
            flex-wrap: wrap; 
            align-items: center;
        }
        h1 span { 
            background: linear-gradient(135deg, #eef2ff 0%, #dbeafe 100%);
            color: #1d4ed8; 
            font-size: 0.8rem; 
            padding: 4px 12px; 
            border-radius: 40px; 
            font-weight: 500;
        }
        .sub { 
            color: #4b587c; 
            margin-bottom: 16px; 
            font-size: 0.85rem; 
            border-left: 3px solid #3b82f6; 
            padding: 8px 16px; 
            background: #fafbff; 
            border-radius: 0 8px 8px 0; 
            line-height: 1.4;
        }

        /* 新增：持仓概况卡片样式 */
        .position-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
            padding: 0;
        }
        .overview-card {
            background: linear-gradient(135deg, #ffffff 0%, #fcfdff 100%);
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid #f0f4ff;
        }
        .overview-card .label {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .overview-card .value {
            font-size: 1.4rem;
            font-weight: 600;
            color: #0b1b32;
            line-height: 1.2;
        }
        .overview-card .value.positive {
            color: #ef4444; /* 红色：盈利/上涨 */
        }
        .overview-card .value.negative {
            color: #16a34a; /* 绿色：亏损/下跌 */
        }
        .overview-card .unit {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-left: 4px;
        }

        /* 分组+排序容器 */
        .group-tabs-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0;
        }
        .group-tabs { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            align-items: center; 
        }
        .sort-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .sort-direction-btn {
            background: linear-gradient(135deg, #f0f2f8 0%, #e8ecf4 100%);
            border-radius: 40px; 
            padding: 8px 18px; 
            font-size: 0.85rem; 
            font-weight: 500; 
            color: #2d3a5e; 
            cursor: pointer; 
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .sort-direction-btn.active {
            background: linear-gradient(135deg, #0b1b32 0%, #1e3a8a 100%);
            color: white;
        }
        .sort-rule-select {
            padding: 8px 18px; 
            border-radius: 40px; 
            border: 1.5px solid #e1e6f0; 
            background: white; 
            font-size: 0.85rem; 
            min-width: 110px;
            transition: all 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%232d3a5e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 36px;
        }
        .view-toggle {
            display: flex;
            gap: 4px;
            background: #f0f2f8;
            border-radius: 40px;
            padding: 4px;
        }
        .view-btn {
            background: transparent;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2d3a5e;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .view-btn.active {
            background: white;
            color: #0b1b32;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .group-tab { 
            background: linear-gradient(135deg, #f0f2f8 0%, #e8ecf4 100%);
            border-radius: 40px; 
            padding: 8px 18px; 
            font-size: 0.85rem; 
            font-weight: 500; 
            color: #2d3a5e; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .group-tab.active { 
            background: linear-gradient(135deg, #0b1b32 0%, #1e3a8a 100%);
            color: white; 
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .group-tab .warning-badge { 
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white; 
            border-radius: 50%; 
            width: 18px; 
            height: 18px; 
            font-size: 12px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 600;
        }
        .group-tab .green-heart { 
            color: #2e7d5e; 
            font-size: 16px; 
            line-height: 1; 
        }
        .group-tab .fund-count {
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 2px 6px;
            font-size: 0.7rem;
            margin-left: 4px;
        }
        .group-tab .delete-group { 
            margin-left: 4px; 
            background: none; 
            border: none; 
            color: inherit; 
            font-size: 16px; 
            cursor: pointer; 
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .add-group-btn { 
            background: linear-gradient(135deg, #e4e9f5 0%, #d7e0f5 100%);
            border: none; 
            border-radius: 50%; 
            width: 36px; 
            height: 36px; 
            font-size: 20px; 
            cursor: pointer; 
            color: #2d3a5e;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .add-group-btn:hover {
            transform: rotate(90deg);
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
        }

        /* 搜索添加区域 */
        .add-area { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            align-items: flex-start; 
            margin-top: 8px; 
            position: relative;
        }
        .search-wrapper { 
            flex: 2 1 220px; 
            position: relative;
        }
        .input-wrapper { width: 100%; position: relative; }
        .input-wrapper input { 
            width: 100%; padding: 14px 18px; border: 1.5px solid #e1e6f0; border-radius: 44px; 
            font-size: 0.9rem; background: white; transition: all 0.2s ease; 
        }
        .input-wrapper input:focus {
            outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .suggestion-dropdown {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white;
            border-radius: 18px; box-shadow: 0 6px 20px rgba(0,20,50,0.15); max-height: 280px;
            overflow-y: auto; z-index: 1000; border: 1px solid #e9ecf5; display: none;
        }
        .suggestion-dropdown.active { display: block; }
        .suggestion-item {
            padding: 12px 16px; border-bottom: 1px solid #f0f2f8; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .suggestion-item:hover { background: #f0f4ff; }
        .suggestion-name { font-weight: 500; color: #0b1b32; font-size: 0.9rem; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .suggestion-code { font-size: 0.75rem; background: #eef2f9; padding: 3px 8px; border-radius: 30px; color: #4b587c; margin-left: 10px; }
        .suggestion-type { font-size: 0.65rem; color: #8f9fc0; margin-left: 6px; }

        .group-select { 
            padding: 14px 18px; border-radius: 44px; border: 1.5px solid #e1e6f0; background: white;
            font-size: 0.9rem; min-width: 110px; transition: all 0.2s ease;
            -webkit-appearance: none; appearance: none;
        }

        /* 新增：基金列表样式（含实时估值/涨跌幅） */
        .fund-list {
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            margin-bottom: 24px;
        }
        .fund-list-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 80px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-bottom: 1px solid #e2e8f0;
        }
        .fund-list-header-item {
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            display: flex;
            align-items: center;
        }
        .fund-list-body {
            max-height: 600px;
            overflow-y: auto;
        }
        .fund-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 80px;
            padding: 16px 20px;
            border-bottom: 1px solid #f8fafc;
            transition: background 0.2s ease;
        }
        .fund-item:hover {
            background: #fafbff;
        }
        .fund-item:last-child {
            border-bottom: none;
        }
        .fund-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .fund-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: #0f172a;
        }
        .fund-code {
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .fund-value, .fund-change-rate, .fund-profit, .fund-op {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .fund-change-rate.positive {
            color: #ef4444; /* 上涨红色 */
        }
        .fund-change-rate.negative {
            color: #16a34a; /* 下跌绿色 */
        }
        .fund-change-rate.flat {
            color: #64748b; /* 平盘灰色 */
        }
        .fund-op {
            justify-content: center;
        }
        .fund-op-btn {
            background: #f1f5f9;
            border: none;
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 0.7rem;
            color: #475569;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .fund-op-btn:hover {
            background: #e2e8f0;
        }

        /* 适配移动端 */
        @media (max-width: 768px) {
            .position-overview {
                grid-template-columns: repeat(2, 1fr);
            }
            .fund-list-header {
                grid-template-columns: 1.5fr 1fr 1fr 0.8fr 60px;
            }
            .fund-item {
                grid-template-columns: 1.5fr 1fr 1fr 0.8fr 60px;
            }
            .fund-name {
                font-size: 0.8rem;
            }
            .fund-value, .fund-change-rate, .fund-profit {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>基金看板 <span>实时估值 · 持仓分析</span></h1>
            <div class="sub">
                交易日实时估值数据每10分钟更新一次 | 持仓概况包含总金额、收益、收益率等核心指标
            </div>

            <!-- 新增：基金持仓概况模块 -->
            <div class="position-overview">
                <div class="overview-card">
                    <div class="label">持仓总金额</div>
                    <div class="value" id="totalAmount">¥0.00</div>
                </div>
                <div class="overview-card">
                    <div class="label">持仓总收益</div>
                    <div class="value" id="totalProfit">¥0.00</div>
                </div>
                <div class="overview-card">
                    <div class="label">持仓收益率</div>
                    <div class="value" id="profitRate">0.00%</div>
                </div>
                <div class="overview-card">
                    <div class="label">持仓数量</div>
                    <div class="value" id="fundCount">0 <span class="unit">只</span></div>
                </div>
                <div class="overview-card">
                    <div class="label">当日预估收益</div>
                    <div class="value" id="todayProfit">¥0.00</div>
                </div>
                <div class="overview-card">
                    <div class="label">当日收益占比</div>
                    <div class="value" id="todayProfitRate">0.00%</div>
                </div>
            </div>

            <!-- 原有分组+排序区域 -->
            <div class="group-tabs-wrapper">
                <div class="group-tabs">
                    <div class="group-tab active">
                        全部基金 <span class="fund-count">8</span>
                    </div>
                    <div class="group-tab">
                        股票型 <span class="green-heart">♥</span> <span class="fund-count">3</span>
                    </div>
                    <div class="group-tab">
                        混合型 <span class="fund-count">4</span>
                    </div>
                    <div class="group-tab">
                        债券型 <span class="warning-badge">1</span> <span class="fund-count">1</span>
                    </div>
                    <button class="add-group-btn">+</button>
                </div>
                <div class="sort-controls">
                    <select class="sort-rule-select">
                        <option value="rate">按涨跌幅排序</option>
                        <option value="value">按估值排序</option>
                        <option value="name">按名称排序</option>
                    </select>
                    <div class="sort-direction-btn active">降序</div>
                    <div class="sort-direction-btn">升序</div>
                    <div class="view-toggle">
                        <button class="view-btn active">列表</button>
                        <button class="view-btn">网格</button>
                    </div>
                </div>
            </div>

            <!-- 原有搜索添加区域 -->
            <div class="add-area">
                <div class="search-wrapper">
                    <div class="input-wrapper">
                        <input type="text" placeholder="输入基金名称/代码搜索">
                        <div class="suggestion-dropdown">
                            <div class="suggestion-item">
                                <div>
                                    <span class="suggestion-name">易方达蓝筹精选混合</span>
                                    <span class="suggestion-code">005827</span>
                                    <span class="suggestion-type">混合型</span>
                                </div>
                            </div>
                            <div class="suggestion-item">
                                <div>
                                    <span class="suggestion-name">招商中证白酒指数(LOF)A</span>
                                    <span class="suggestion-code">161725</span>
                                    <span class="suggestion-type">指数型</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <select class="group-select">
                    <option value="">添加到分组</option>
                    <option value="all">全部基金</option>
                    <option value="stock">股票型</option>
                    <option value="mix">混合型</option>
                    <option value="bond">债券型</option>
                </select>
            </div>
        </div>

        <!-- 新增：基金实时估值列表 -->
        <div class="fund-list">
            <div class="fund-list-header">
                <div class="fund-list-header-item">基金名称</div>
                <div class="fund-list-header-item">实时估值</div>
                <div class="fund-list-header-item">涨跌幅</div>
                <div class="fund-list-header-item">持仓收益</div>
                <div class="fund-list-header-item">操作</div>
            </div>
            <div class="fund-list-body" id="fundListBody">
                <!-- 基金列表项由JS动态渲染 -->
            </div>
        </div>
    </div>

    <script>
        // 模拟基金数据（实际可对接接口获取）
        const fundData = [
            {
                name: "易方达蓝筹精选混合",
                code: "005827",
                type: "混合型",
                currentValue: 1.5860,
                changeRate: 1.25, // 涨跌幅（%）
                positionProfit: 286.50 // 持仓收益（元）
            },
            {
                name: "招商中证白酒指数(LOF)A",
                code: "161725",
                type: "指数型",
                currentValue: 1.4230,
                changeRate: -0.85,
                positionProfit: -158.20
            },
            {
                name: "中欧医疗健康混合A",
                code: "003095",
                type: "混合型",
                currentValue: 1.7850,
                changeRate: 2.10,
                positionProfit: 458.75
            },
            {
                name: "南方中证新能源ETF联接C",
                code: "013128",
                type: "指数型",
                currentValue: 1.2580,
                changeRate: -1.50,
                positionProfit: -210.30
            },
            {
                name: "华夏债券优选A",
                code: "001021",
                type: "债券型",
                currentValue: 1.0890,
                changeRate: 0.05,
                positionProfit: 89.50
            }
        ];

        // 计算持仓概况数据
        function calculateOverview() {
            const totalAmount = fundData.reduce((sum, fund) => {
                // 模拟持仓金额 = 估值 * 持仓份额（这里假设每份1000份）
                return sum + (fund.currentValue * 1000);
            }, 0);
            
            const totalProfit = fundData.reduce((sum, fund) => sum + fund.positionProfit, 0);
            const profitRate = ((totalProfit / (totalAmount - totalProfit)) * 100).toFixed(2);
            const fundCount = fundData.length;
            const todayProfit = fundData.reduce((sum, fund) => {
                // 模拟当日收益 = 估值变动 * 持仓份额
                const changeValue = fund.currentValue * (fund.changeRate / 100);
                return sum + (changeValue * 1000);
            }, 0);
            const todayProfitRate = ((todayProfit / totalAmount) * 100).toFixed(2);

            // 更新持仓概况DOM
            document.getElementById('totalAmount').textContent = `¥${totalAmount.toFixed(2)}`;
            document.getElementById('totalProfit').textContent = `¥${totalProfit.toFixed(2)}`;
            document.getElementById('totalProfit').className = `value ${totalProfit >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('profitRate').textContent = `${profitRate}%`;
            document.getElementById('profitRate').className = `value ${profitRate >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('fundCount').textContent = `${fundCount} `;
            document.getElementById('todayProfit').textContent = `¥${todayProfit.toFixed(2)}`;
            document.getElementById('todayProfit').className = `value ${todayProfit >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('todayProfitRate').textContent = `${todayProfitRate}%`;
            document.getElementById('todayProfitRate').className = `value ${todayProfitRate >= 0 ? 'positive' : 'negative'}`;
        }

        // 渲染基金列表
        function renderFundList() {
            const fundListBody = document.getElementById('fundListBody');
            fundListBody.innerHTML = '';

            fundData.forEach(fund => {
                const fundItem = document.createElement('div');
                fundItem.className = 'fund-item';

                // 涨跌幅样式类
                let changeRateClass = 'flat';
                if (fund.changeRate > 0) changeRateClass = 'positive';
                else if (fund.changeRate < 0) changeRateClass = 'negative';

                // 持仓收益样式类
                let profitClass = fund.positionProfit >= 0 ? 'positive' : 'negative';

                fundItem.innerHTML = `
                    <div class="fund-info">
                        <div class="fund-name">${fund.name}</div>
                        <div class="fund-code">${fund.code} | ${fund.type}</div>
                    </div>
                    <div class="fund-value">¥${fund.currentValue.toFixed(4)}</div>
                    <div class="fund-change-rate ${changeRateClass}">${fund.changeRate > 0 ? '+' : ''}${fund.changeRate.toFixed(2)}%</div>
                    <div class="fund-profit ${profitClass}">¥${fund.positionProfit.toFixed(2)}</div>
                    <div class="fund-op">
                        <button class="fund-op-btn">详情</button>
                    </div>
                `;

                fundListBody.appendChild(fundItem);
            });
        }

        // 模拟实时更新估值（每10秒更新一次，实际可对接接口轮询）
        function simulateRealTimeUpdate() {
            setInterval(() => {
                fundData.forEach(fund => {
                    // 随机波动估值和涨跌幅（模拟实时变化）
                    const randomChange = (Math.random() - 0.5) * 0.02; // -0.01 ~ +0.01
                    fund.currentValue = (fund.currentValue + randomChange).toFixed(4) * 1;
                    fund.changeRate = (fund.changeRate + (randomChange / fund.currentValue) * 100).toFixed(2) * 1;
                });

                // 重新渲染数据
                calculateOverview();
                renderFundList();
            }, 10000);
        }

        // 初始化
        window.onload = function() {
            calculateOverview();
            renderFundList();
            simulateRealTimeUpdate();

            // 原有交互逻辑（排序、切换视图等）
            const sortDirectionBtns = document.querySelectorAll('.sort-direction-btn');
            sortDirectionBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    sortDirectionBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    // 排序逻辑可扩展
                });
            });

            const viewBtns = document.querySelectorAll('.view-btn');
            viewBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    viewBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    // 视图切换逻辑可扩展
                });
            });
        };
    </script>
</body>
</html>
