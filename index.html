<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>基金涨幅卡 · 云端同步版</title>
    <!-- 引入 AWS SDK 用于连接 Cloudflare R2 -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f3f5f9;
            margin: 0;
            min-height: 100vh;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
        }
        .header {
            background: white;
            border-radius: 28px;
            padding: 24px 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            margin-bottom: 28px;
            border: 1px solid rgba(0,0,0,0.03);
        }
        h1 {
            margin: 0 0 12px 0;
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0b1b32;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        h1 span {
            background: #eef2ff;
            color: #1d4ed8;
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        .sub {
            color: #4b587c;
            margin-bottom: 24px;
            font-size: 0.95rem;
            border-left: 3px solid #3b82f6;
            padding-left: 16px;
            background: #fafbff;
            border-radius: 0 8px 8px 0;
            line-height: 1.5;
        }
        .add-area {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .input-wrapper {
            flex: 2 1 260px;
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            padding: 16px 20px;
            border: 1.5px solid #e1e6f0;
            border-radius: 44px;
            font-size: 1rem;
            background: white;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.01);
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59,130,246,0.15);
        }
        .input-wrapper input::placeholder {
            color: #9aa8c7;
            font-weight: 300;
        }
        .add-btn {
            background: #0b1b32;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 18px rgba(11,27,50,0.1);
            border: 1px solid #1e2d4a;
            flex: 0 0 auto;
        }
        .add-btn:hover {
            background: #1e2f4a;
            transform: scale(1.02);
        }
        .add-btn:active {
            background: #091626;
            transform: scale(0.98);
        }
        .info-note {
            margin-top: 16px;
            font-size: 0.85rem;
            color: #6a789b;
            background: #f0f4fe;
            padding: 10px 16px;
            border-radius: 30px;
            display: inline-block;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
            margin-top: 20px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 20px 20px 18px 20px;
            box-shadow: 0 12px 30px -8px rgba(0,20,50,0.1);
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 36px -12px rgba(0,50,100,0.2);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
        }
        .fund-title {
            font-weight: 700;
            font-size: 1.2rem;
            line-height: 1.4;
            color: #0b1b32;
            word-break: break-word;
            max-width: 70%;
        }
        .fund-code {
            font-size: 0.8rem;
            background: #eef2f9;
            padding: 4px 10px;
            border-radius: 40px;
            color: #2d3a5e;
            font-weight: 500;
        }
        .delete-btn {
            background: none;
            border: 1px solid #e9ecf5;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            color: #8f9fc0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            background: white;
        }
        .delete-btn:hover {
            background: #fee2e2;
            border-color: #f87171;
            color: #b91c1c;
        }
        .rates-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 8px;
            margin: 12px 0 6px;
            background: #f8faff;
            padding: 16px 12px;
            border-radius: 24px;
        }
        .rate-item {
            flex: 1 0 auto;
            min-width: 70px;
            text-align: center;
        }
        .rate-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #5c6b93;
            letter-spacing: 0.3px;
            font-weight: 500;
        }
        .rate-value {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 2px;
        }
        .rate-value.positive {
            color: #cf3e3e;
        }
        .rate-value.negative {
            color: #2e7d5e;
        }
        .rate-value.neutral {
            color: #6b7a9f;
        }
        .error-placeholder {
            color: #a00;
            background: #fff2f2;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.9rem;
            margin: 12px 0;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 48px;
            color: #6f7da0;
            border: 2px dashed #dbe1ef;
            margin-top: 40px;
        }
        .empty-state p {
            font-size: 1.1rem;
            margin: 12px 0 0;
        }
        .sync-area {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
            align-items: center;
            flex-wrap: wrap;
        }
        .sync-btn {
            background: #eef2f6;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #dbe1ef;
        }
        .sync-btn:hover {
            background: #e2e8f2;
        }
        .sync-status {
            color: #6a789b;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }
        .footer-note {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #9aa9c2;
            text-align: center;
        }
        .loading-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3b82f6;
            margin-left: 4px;
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            📈 基金涨幅卡
            <span>云端同步·多设备</span>
        </h1>
        <div class="sub">
            近3/5/7/10/15个交易日涨幅 · 数据自动同步到 Cloudflare R2
        </div>
        <div class="add-area">
            <div class="input-wrapper">
                <input type="text" id="fundCodeInput" placeholder="输入基金代码 (例如 160119 或 005827)" pattern="\d*" inputmode="numeric">
            </div>
            <button class="add-btn" id="addFundBtn">➕ 添加基金</button>
        </div>
        <div class="info-note">
            ⚡ 数据来源：天天基金网 · 添加/删除自动同步至云端。
        </div>
    </div>

    <!-- 卡片容器 -->
    <div id="cardContainer" class="card-grid">
        <!-- 动态渲染 -->
    </div>

    <!-- 同步控制区域 -->
    <div class="sync-area">
        <button class="sync-btn" id="syncToCloudBtn">☁️ 手动同步到云端</button>
        <span class="sync-status" id="syncStatus"></span>
    </div>

    <div class="footer-note">
        ✨ 基金列表保存在本地及云端（Cloudflare R2）。打开网页自动同步。
    </div>
</div>

<script>
(function() {
    // --- 配置 ---
    const STORAGE_KEY = 'funds';
    const PERIODS = [3, 5, 7, 10, 15];  // 需要计算的交易日数

    // --- Cloudflare R2 配置（请根据您的实际信息修改）---
    const R2_CONFIG = {
        bucketName: 'fund-list-app',                // 存储桶名称
        accessKeyId: 'df123c57ee036af018c3f6f801fae726',        // 访问密钥ID
        secretAccessKey: 'c38798027a0815dae26376089d4f15eef26e2eb66487b4cf9346a17f26ff29e3',  // 机密密钥
        endpoint: 'https://d6ac8bc5f7ebda3a5ac875c4346917fe.r2.cloudflarestorage.com'          // S3端点
    };

    // 初始化 S3 客户端 (AWS SDK 已通过 script 标签加载)
    let s3;
    try {
        s3 = new AWS.S3({
            endpoint: R2_CONFIG.endpoint,
            accessKeyId: R2_CONFIG.accessKeyId,
            secretAccessKey: R2_CONFIG.secretAccessKey,
            s3ForcePathStyle: true,
            signatureVersion: 'v4',
            region: 'auto'
        });
        console.log('S3 客户端初始化成功');
    } catch (e) {
        console.error('S3 客户端初始化失败', e);
    }

    // --- 全局状态 ---
    let fundsData = [];            // { code, name, netWorth, error }
    let currentLoadSeq = 0;        // 用于忽略过期异步回调

    // --- DOM 元素 ---
    const cardContainer = document.getElementById('cardContainer');
    const fundCodeInput = document.getElementById('fundCodeInput');
    const addBtn = document.getElementById('addFundBtn');

    // --- 工具函数：本地存储操作 ---
    function getStoredFunds() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch {
            return [];
        }
    }

    // 修改后的 setStoredFunds：保存到本地并异步同步到云端
    function setStoredFunds(codes) {
        // 保存到本地
        localStorage.setItem(STORAGE_KEY, JSON.stringify(codes));
        // 异步保存到云端（不阻塞主流程）
        if (s3) {
            saveToCloud(codes).catch(err => {
                console.warn('云端备份失败，但本地已保存', err);
                showSyncStatus('❌ 云端同步失败', 3000);
            });
        } else {
            console.warn('S3未初始化，无法同步到云端');
        }
    }

    // --- 云端读写函数 ---
    async function loadFromCloud() {
        if (!s3) throw new Error('S3客户端未初始化');
        const params = {
            Bucket: R2_CONFIG.bucketName,
            Key: 'funds-list.json'
        };
        try {
            const data = await s3.getObject(params).promise();
            const content = data.Body.toString('utf-8');
            return JSON.parse(content);
        } catch (error) {
            // 文件不存在属于正常情况（首次使用）
            if (error.code === 'NoSuchKey') {
                console.log('云端无数据，将使用本地数据');
                return null;
            }
            throw error;
        }
    }

    async function saveToCloud(codes) {
        if (!s3) throw new Error('S3客户端未初始化');
        const params = {
            Bucket: R2_CONFIG.bucketName,
            Key: 'funds-list.json',
            Body: JSON.stringify(codes),
            ContentType: 'application/json',
            CacheControl: 'no-cache'
        };
        await s3.putObject(params).promise();
        console.log('已同步到云端');
    }

    // 显示同步状态（临时消息）
    function showSyncStatus(msg, duration = 2000) {
        const statusEl = document.getElementById('syncStatus');
        if (statusEl) {
            statusEl.textContent = msg;
            if (duration > 0) {
                setTimeout(() => { statusEl.textContent = ''; }, duration);
            }
        }
    }

    // --- 核心：从天天基金加载单个基金净值 (返回 Promise) ---
    function loadFundData(code) {
        return new Promise((resolve, reject) => {
            // 清理之前可能残留的全局变量
            const GLOBAL_KEYS = ['Data_netWorthTrend', 'fund_name', 'fS_name'];
            GLOBAL_KEYS.forEach(key => delete window[key]);

            const script = document.createElement('script');
            script.src = `https://fund.eastmoney.com/pingzhongdata/${code}.js?t=${Date.now()}`;
            script.charset = 'utf-8';

            const timeoutId = setTimeout(() => {
                script.remove();
                reject(new Error('加载超时'));
            }, 10000);

            script.onload = () => {
                setTimeout(() => {
                    clearTimeout(timeoutId);
                    let netWorth = null;
                    if (window.Data_netWorthTrend && Array.isArray(window.Data_netWorthTrend)) {
                        netWorth = window.Data_netWorthTrend.map(item => ({
                            x: item.x,
                            y: item.y
                        }));
                    }
                    const name = window.fund_name || window.fS_name || code;
                    GLOBAL_KEYS.forEach(key => delete window[key]);
                    script.remove();

                    if (netWorth && netWorth.length > 0) {
                        resolve({ code, name, netWorth });
                    } else {
                        reject(new Error('净值数据为空或格式错误'));
                    }
                }, 60);
            };

            script.onerror = () => {
                clearTimeout(timeoutId);
                GLOBAL_KEYS.forEach(key => delete window[key]);
                script.remove();
                reject(new Error('网络请求失败，请检查代码是否正确'));
            };

            document.head.appendChild(script);
        });
    }

    // --- 计算涨幅 ---
    function computeRates(netWorth) {
        if (!netWorth || netWorth.length === 0) return PERIODS.map(() => null);
        const sorted = [...netWorth].sort((a, b) => new Date(b.x) - new Date(a.x));
        const latest = sorted[0].y;
        return PERIODS.map(days => {
            if (sorted.length > days) {
                const old = sorted[days].y;
                return ((latest / old) - 1) * 100;
            }
            return null;
        });
    }

    // --- 渲染卡片 ---
    function renderCards() {
        if (!cardContainer) return;

        if (fundsData.length === 0) {
            cardContainer.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1;">
                    <div style="font-size:48px;">📭</div>
                    <p>还没有添加任何基金<br>在上方输入基金代码开始跟踪</p>
                </div>
            `;
            return;
        }

        let html = '';
        for (const item of fundsData) {
            const { code, name, netWorth, error } = item;
            const isError = error === true;
            const isLoading = !isError && !netWorth;

            let rates = [];
            if (!isError && netWorth) {
                rates = computeRates(netWorth);
            }

            let ratesHtml = '';
            if (isLoading) {
                ratesHtml = `<div style="text-align:center;padding:16px;color:#4b587c;">数据加载中 <span class="loading-dot"></span><span class="loading-dot" style="animation-delay:0.2s"></span><span class="loading-dot" style="animation-delay:0.4s"></span></div>`;
            } else if (isError) {
                ratesHtml = `<div class="error-placeholder">⚠️ 加载失败 (可能代码无效或网络问题)</div>`;
            } else if (rates.length > 0) {
                let items = '';
                PERIODS.forEach((period, idx) => {
                    const val = rates[idx];
                    let valueStr = '——';
                    let cls = 'neutral';
                    if (val !== null) {
                        valueStr = val.toFixed(2) + '%';
                        if (val > 0) cls = 'positive';
                        else if (val < 0) cls = 'negative';
                        else cls = 'neutral';
                    }
                    items += `
                        <div class="rate-item">
                            <div class="rate-label">${period}日</div>
                            <div class="rate-value ${cls}">${valueStr}</div>
                        </div>
                    `;
                });
                ratesHtml = `<div class="rates-grid">${items}</div>`;
            } else {
                ratesHtml = `<div class="error-placeholder">净值数据不足</div>`;
            }

            const displayName = (typeof name === 'string' && name !== code) ? name : code;
            const shortName = displayName.length > 22 ? displayName.slice(0, 20) + '…' : displayName;

            html += `
                <div class="card" data-code="${code}">
                    <div class="card-header">
                        <div class="fund-title" title="${displayName}">${shortName}</div>
                        <span class="fund-code">${code}</span>
                        <button class="delete-btn" data-code="${code}" title="删除此基金">✕</button>
                    </div>
                    ${ratesHtml}
                </div>
            `;
        }

        cardContainer.innerHTML = html;

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const code = btn.getAttribute('data-code');
                if (code) deleteFund(code);
            });
        });
    }

    // --- 删除基金 ---
    function deleteFund(code) {
        let codes = getStoredFunds();
        codes = codes.filter(c => c !== code);
        setStoredFunds(codes);  // 触发本地保存 + 云端同步
        loadAllFunds();
    }

    // --- 加载所有基金 (串行) ---
    async function loadAllFunds() {
        const seq = ++currentLoadSeq;
        const codes = getStoredFunds();

        fundsData = codes.map(code => ({
            code,
            name: '加载中...',
            netWorth: null,
            error: false
        }));
        renderCards();

        for (let i = 0; i < codes.length; i++) {
            const code = codes[i];
            try {
                const data = await loadFundData(code);
                if (seq !== currentLoadSeq) return;
                fundsData[i] = {
                    code: data.code,
                    name: data.name,
                    netWorth: data.netWorth,
                    error: false
                };
            } catch (err) {
                if (seq !== currentLoadSeq) return;
                fundsData[i] = {
                    code,
                    name: `错误: ${code}`,
                    netWorth: null,
                    error: true
                };
            }
            renderCards();
        }
    }

    // --- 添加新基金 ---
    async function addFund() {
        const rawCode = fundCodeInput.value.trim();
        if (!rawCode) {
            alert('请输入基金代码');
            return;
        }
        if (!/^\d+$/.test(rawCode)) {
            alert('基金代码应为纯数字');
            return;
        }

        const currentCodes = getStoredFunds();
        if (currentCodes.includes(rawCode)) {
            alert('该基金已在列表中');
            fundCodeInput.value = '';
            return;
        }

        let isValid = false;
        try {
            addBtn.disabled = true;
            addBtn.textContent = '验证中...';
            await loadFundData(rawCode);
            isValid = true;
        } catch (e) {
            alert(`无法添加：${e.message}，请检查代码是否正确`);
        } finally {
            addBtn.disabled = false;
            addBtn.textContent = '➕ 添加基金';
        }

        if (!isValid) return;

        const newCodes = [...currentCodes, rawCode];
        setStoredFunds(newCodes);
        fundCodeInput.value = '';
        await loadAllFunds();
        showSyncStatus('已添加到云端', 2000);
    }

    // --- 初始化：优先从云端加载 ---
    async function init() {
        // 显示加载状态
        if (cardContainer) {
            cardContainer.innerHTML = '<div class="empty-state"><div style="font-size:48px;">☁️</div><p>正在从云端同步...</p></div>';
        }

        try {
            if (s3) {
                const cloudCodes = await loadFromCloud();
                if (cloudCodes && cloudCodes.length > 0) {
                    // 云端有数据，保存到本地并加载
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudCodes));
                    showSyncStatus('✅ 已从云端同步', 2000);
                } else {
                    // 云端无数据，尝试从本地加载，并备份到云端
                    const localCodes = getStoredFunds();
                    if (localCodes.length > 0) {
                        await saveToCloud(localCodes);
                        showSyncStatus('📤 已备份本地数据到云端', 2000);
                    }
                }
            } else {
                console.warn('S3未初始化，仅使用本地存储');
                showSyncStatus('⚠️ 云端不可用，使用本地数据', 3000);
            }
        } catch (error) {
            console.error('云端同步失败，使用本地数据', error);
            showSyncStatus('❌ 云端同步失败，使用本地', 3000);
        }

        // 加载所有基金数据（使用最终确定的本地存储）
        loadAllFunds();

        // 事件绑定
        addBtn.addEventListener('click', addFund);
        fundCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addFund();
            }
        });
        fundCodeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^\d]/g, '');
        });

        // 手动同步按钮
        document.getElementById('syncToCloudBtn').addEventListener('click', async () => {
            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = '同步中...';
            const codes = getStoredFunds();
            try {
                await saveToCloud(codes);
                statusEl.textContent = '✅ 同步成功';
                setTimeout(() => { statusEl.textContent = ''; }, 2000);
            } catch (e) {
                statusEl.textContent = '❌ 同步失败';
                console.error(e);
                setTimeout(() => { statusEl.textContent = ''; }, 2000);
            }
        });
    }

    // 启动一切
    init();
})();
</script>
<!-- 重要提示：请确保在 Cloudflare R2 存储桶中配置了 CORS 策略，允许您的域名访问。 -->
