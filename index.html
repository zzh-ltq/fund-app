<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>基金涨幅卡 · 分组版</title>
    <!-- Chart.js 轻量绘图 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- AWS SDK for R2 (保留原同步逻辑) -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f3f5f9;
            margin: 0;
            min-height: 100vh;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
        }
        .header {
            background: white;
            border-radius: 28px;
            padding: 20px 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.03);
        }
        h1 {
            margin: 0 0 8px 0;
            font-size: 1.8rem; /* 略调小 */
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0b1b32;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        h1 span {
            background: #eef2ff;
            color: #1d4ed8;
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        .sub {
            color: #4b587c;
            margin-bottom: 16px;
            font-size: 0.9rem;
            border-left: 3px solid #3b82f6;
            padding-left: 16px;
            background: #fafbff;
            border-radius: 0 8px 8px 0;
            line-height: 1.5;
        }
        /* 分组标签栏 */
        .group-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0 16px;
            align-items: center;
        }
        .group-tab {
            background: #f0f2f8;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2d3a5e;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .group-tab.active {
            background: #0b1b32;
            color: white;
            border-color: #1e2d4a;
        }
        .group-tab .warning-badge {
            background: #f97316;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .group-tab .delete-group {
            margin-left: 4px;
            background: none;
            border: none;
            color: inherit;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.6;
            padding: 0 2px;
        }
        .group-tab .delete-group:hover {
            opacity: 1;
        }
        .add-group-btn {
            background: #e4e9f5;
            border: none;
            border-radius: 40px;
            width: 36px;
            height: 36px;
            font-size: 20px;
            cursor: pointer;
            color: #2d3a5e;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        /* 基金添加区域 */
        .add-area {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 8px;
        }
        .input-wrapper {
            flex: 2 1 260px;
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            padding: 14px 18px; /* 略微调小 */
            border: 1.5px solid #e1e6f0;
            border-radius: 44px;
            font-size: 0.95rem;
            background: white;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.01);
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59,130,246,0.15);
        }
        .input-wrapper input::placeholder {
            color: #9aa8c7;
            font-weight: 300;
        }
        .group-select {
            padding: 14px 18px;
            border-radius: 44px;
            border: 1.5px solid #e1e6f0;
            background: white;
            font-size: 0.95rem;
            min-width: 120px;
        }
        .add-btn {
            background: #0b1b32;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 18px rgba(11,27,50,0.1);
            border: 1px solid #1e2d4a;
            flex: 0 0 auto;
        }
        .add-btn:hover {
            background: #1e2f4a;
            transform: scale(1.02);
        }
        .add-btn:active {
            background: #091626;
            transform: scale(0.98);
        }
        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }
        /* 卡片样式 - 字体调小2号 (原1.2rem标题改为1rem, 其他相应调整) */
        .card {
            background: white;
            border-radius: 24px;
            padding: 16px 16px 14px 16px;
            box-shadow: 0 12px 30px -8px rgba(0,20,50,0.1);
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            cursor: pointer; /* 点击卡片弹出曲线 */
            position: relative;
        }
        .card.risk-highlight {
            border: 2px solid #f97316;
            box-shadow: 0 0 0 1px #f97316 inset;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .fund-title {
            font-weight: 700;
            font-size: 1rem; /* 调小 */
            line-height: 1.4;
            color: #0b1b32;
            word-break: break-word;
            max-width: 65%;
        }
        .fund-code {
            font-size: 0.7rem; /* 调小 */
            background: #eef2f9;
            padding: 3px 8px;
            border-radius: 40px;
            color: #2d3a5e;
            font-weight: 500;
        }
        .delete-btn {
            background: none;
            border: 1px solid #e9ecf5;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 16px;
            color: #8f9fc0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            background: white;
            z-index: 2;
        }
        .delete-btn:hover {
            background: #fee2e2;
            border-color: #f87171;
            color: #b91c1c;
        }
        .latest-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem; /* 调小 */
            color: #4b587c;
            margin-bottom: 8px;
            background: #f8faff;
            padding: 6px 10px;
            border-radius: 18px;
        }
        .latest-info .date {
            font-weight: 400;
        }
        .latest-info .value {
            font-weight: 600;
            color: #0b1b32;
        }
        .change {
            margin-left: 6px;
            font-weight: 500;
        }
        .change.positive { color: #cf3e3e; }
        .change.negative { color: #2e7d5e; }
        .rates-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 4px;
            margin: 8px 0 4px;
            background: #f8faff;
            padding: 12px 8px;
            border-radius: 20px;
        }
        .rate-item {
            flex: 1 0 auto;
            min-width: 50px;
            text-align: center;
        }
        .rate-label {
            font-size: 0.6rem; /* 调小 */
            text-transform: uppercase;
            color: #5c6b93;
            letter-spacing: 0.3px;
            font-weight: 500;
        }
        .rate-value {
            font-size: 1rem; /* 调小 */
            font-weight: 600;
            margin-top: 2px;
        }
        .rate-value.positive { color: #cf3e3e; }
        .rate-value.negative { color: #2e7d5e; }
        .rate-value.neutral { color: #6b7a9f; }
        .risk-tag {
            font-size: 0.7rem;
            background: #f97316;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
            align-self: flex-start;
        }
        /* 模态框 (曲线) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-header h3 {
            margin: 0;
            font-size: 1.2rem;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #6b7a9f;
        }
        .period-selector {
            display: flex;
            gap: 8px;
            margin: 16px 0;
        }
        .period-btn {
            background: #eef2f9;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .period-btn.active {
            background: #0b1b32;
            color: white;
        }
        .chart-container {
            width: 100%;
            height: 300px;
        }
        .sync-area {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
            align-items: center;
            flex-wrap: wrap;
        }
        .sync-btn {
            background: #eef2f6;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1px solid #dbe1ef;
        }
        .sync-status {
            color: #6a789b;
            font-size: 0.8rem;
        }
        .footer-note {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #9aa9c2;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📈 基金分组看板 <span>云端同步·风险标记</span></h1>
        <div class="sub">近3/5/7/10/15日涨幅 · 最新净值 · 15日最大跌幅≥8.5%高亮</div>
        
        <!-- 分组标签栏 -->
        <div class="group-tabs" id="groupTabs">
            <!-- 由JS动态渲染 -->
        </div>

        <!-- 添加基金区域 -->
        <div class="add-area">
            <div class="input-wrapper">
                <input type="text" id="fundCodeInput" placeholder="基金代码 (如 160119)" pattern="\d*" inputmode="numeric">
            </div>
            <select id="groupSelect" class="group-select"></select>
            <button class="add-btn" id="addFundBtn">➕ 添加</button>
        </div>
    </div>

    <!-- 卡片容器 -->
    <div id="cardContainer" class="card-grid"></div>

    <!-- 同步控制区 -->
    <div class="sync-area">
        <button class="sync-btn" id="syncToCloudBtn">☁️ 手动同步云端</button>
        <span class="sync-status" id="syncStatus"></span>
    </div>
    <div class="footer-note">
        ✨ 点击卡片查看15/30/60/90日曲线 · 分组管理自动保存
    </div>
</div>

<!-- 曲线模态框 -->
<div class="modal" id="chartModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalFundName">基金名称</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="period-selector" id="periodSelector">
            <button class="period-btn active" data-days="15">15日</button>
            <button class="period-btn" data-days="30">30日</button>
            <button class="period-btn" data-days="60">60日</button>
            <button class="period-btn" data-days="90">90日</button>
        </div>
        <div class="chart-container">
            <canvas id="fundChart"></canvas>
        </div>
    </div>
</div>

<script>
(function() {
    // ---------- 配置 ----------
    const STORAGE_KEY = 'funds_app_data';      // 新版存储对象
    const PERIODS = [3, 5, 7, 10, 15];          // 卡片涨幅周期
    const RISK_THRESHOLD = -8.5;                 // 最大跌幅阈值

    // Cloudflare R2 配置 (请替换为您的实际值)
    const R2_CONFIG = {
        bucketName: 'fund-list-app',
        accessKeyId: 'df123c57ee036af018c3f6f801fae726',
        secretAccessKey: 'c38798027a0815dae26376089d4f15eef26e2eb66487b4cf9346a17f26ff29e3',
        endpoint: 'https://d6ac8bc5f7ebda3a5ac875c4346917fe.r2.cloudflarestorage.com'
    };

    // 初始化 S3 (如果可用)
    let s3 = null;
    try {
        s3 = new AWS.S3({
            endpoint: R2_CONFIG.endpoint,
            accessKeyId: R2_CONFIG.accessKeyId,
            secretAccessKey: R2_CONFIG.secretAccessKey,
            s3ForcePathStyle: true,
            signatureVersion: 'v4',
            region: 'auto'
        });
    } catch (e) { console.warn('S3 init failed', e); }

    // ---------- 全局数据结构 ----------
    // appData = { groups: [ { id, name, fundCodes: [] } ], fundsCache: { code: { name, netWorth, error } } }
    let appData = {
        groups: [],
        fundsCache: {}   // 缓存基金净值数据，避免重复加载
    };
    let currentGroupId = 'default';   // 当前选中的分组ID
    let chartInstance = null;         // 当前图表实例
    let currentModalFund = null;      // 模态框当前显示的基金数据

    // ---------- 本地存储操作 ----------
    function loadAppData() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                // 如果解析后符合新格式（有groups字段），则使用，否则迁移旧数据
                if (parsed && Array.isArray(parsed.groups)) {
                    appData = parsed;
                } else {
                    // 旧格式：直接是数组 [code1, code2] -> 迁移到默认分组
                    const oldCodes = Array.isArray(parsed) ? parsed : [];
                    appData = {
                        groups: [{ id: 'default', name: '默认', fundCodes: oldCodes }],
                        fundsCache: {}
                    };
                }
            } else {
                // 全新初始化
                appData = {
                    groups: [{ id: 'default', name: '默认', fundCodes: [] }],
                    fundsCache: {}
                };
            }
        } catch (e) {
            console.warn('loadAppData error', e);
            appData = { groups: [{ id: 'default', name: '默认', fundCodes: [] }], fundsCache: {} };
        }
        // 确保fundsCache存在
        if (!appData.fundsCache) appData.fundsCache = {};
    }

    function saveAppData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        // 异步同步到云端
        if (s3) {
            saveToCloud(appData).catch(err => console.warn('cloud sync failed', err));
        }
    }

    // 云端读写
    async function loadFromCloud() {
        if (!s3) throw new Error('S3未初始化');
        const params = { Bucket: R2_CONFIG.bucketName, Key: 'funds_app_data.json' };
        try {
            const data = await s3.getObject(params).promise();
            const content = data.Body.toString('utf-8');
            return JSON.parse(content);
        } catch (e) {
            if (e.code === 'NoSuchKey') return null;
            throw e;
        }
    }

    async function saveToCloud(data) {
        if (!s3) return;
        const params = {
            Bucket: R2_CONFIG.bucketName,
            Key: 'funds_app_data.json',
            Body: JSON.stringify(data),
            ContentType: 'application/json',
            CacheControl: 'no-cache'
        };
        await s3.putObject(params).promise();
    }

    // ---------- 分组管理 ----------
    function renderGroups() {
        const tabsContainer = document.getElementById('groupTabs');
        const groupSelect = document.getElementById('groupSelect');
        if (!tabsContainer) return;

        let tabsHtml = '';
        let optionsHtml = '';

        appData.groups.forEach(group => {
            // 检查该分组下是否有风险基金 (最大跌幅≥8.5%)
            const hasRisk = group.fundCodes.some(code => {
                const cached = appData.fundsCache[code];
                if (!cached || !cached.netWorth) return false;
                const maxDrop = computeMaxDrop(cached.netWorth, 15);
                return maxDrop !== null && maxDrop <= RISK_THRESHOLD;
            });

            const activeClass = group.id === currentGroupId ? 'active' : '';
            const warningBadge = hasRisk ? '<span class="warning-badge">!</span>' : '';

            // 不可删除默认分组
            const deleteBtn = group.id === 'default' ? '' : 
                `<button class="delete-group" data-group-id="${group.id}" title="删除分组">✕</button>`;

            tabsHtml += `
                <div class="group-tab ${activeClass}" data-group-id="${group.id}">
                    ${group.name} ${warningBadge} ${deleteBtn}
                </div>
            `;

            optionsHtml += `<option value="${group.id}">${group.name}</option>`;
        });

        // 添加分组按钮
        tabsHtml += `<button class="add-group-btn" id="addGroupBtn">+</button>`;
        tabsContainer.innerHTML = tabsHtml;

        if (groupSelect) groupSelect.innerHTML = optionsHtml;

        // 绑定分组点击事件
        document.querySelectorAll('.group-tab[data-group-id]').forEach(el => {
            el.addEventListener('click', (e) => {
                // 如果点击的是删除按钮，不切换分组
                if (e.target.classList.contains('delete-group')) return;
                const gid = el.getAttribute('data-group-id');
                if (gid) {
                    currentGroupId = gid;
                    renderGroups();
                    renderCards();   // 重新显示当前分组卡片
                }
            });
        });

        // 删除分组按钮
        document.querySelectorAll('.delete-group').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const gid = btn.getAttribute('data-group-id');
                if (gid && gid !== 'default') {
                    if (confirm(`删除分组「${appData.groups.find(g=>g.id===gid)?.name}”，其下的基金将移至默认分组`)) {
                        // 移动基金到默认分组
                        const defaultGroup = appData.groups.find(g => g.id === 'default');
                        const delGroup = appData.groups.find(g => g.id === gid);
                        if (defaultGroup && delGroup) {
                            defaultGroup.fundCodes.push(...delGroup.fundCodes);
                            appData.groups = appData.groups.filter(g => g.id !== gid);
                            if (currentGroupId === gid) currentGroupId = 'default';
                            saveAppData();
                            renderGroups();
                            renderCards();
                        }
                    }
                }
            });
        });

        // 添加分组按钮
        const addBtn = document.getElementById('addGroupBtn');
        if (addBtn) {
            addBtn.addEventListener('click', () => {
                const newName = prompt('请输入新分组名称', '新分组');
                if (newName && newName.trim()) {
                    const newId = 'group_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                    appData.groups.push({ id: newId, name: newName.trim(), fundCodes: [] });
                    saveAppData();
                    renderGroups();
                }
            });
        }
    }

    // ---------- 基金数据加载 ----------
    async function loadFundData(code, forceRefresh = false) {
        // 优先从缓存读取
        if (!forceRefresh && appData.fundsCache[code] && appData.fundsCache[code].netWorth) {
            return appData.fundsCache[code];
        }

        return new Promise((resolve, reject) => {
            const GLOBAL_KEYS = ['Data_netWorthTrend', 'fund_name', 'fS_name'];
            GLOBAL_KEYS.forEach(key => delete window[key]);

            const script = document.createElement('script');
            script.src = `https://fund.eastmoney.com/pingzhongdata/${code}.js?t=${Date.now()}`;
            script.charset = 'utf-8';
            const timeoutId = setTimeout(() => { script.remove(); reject(new Error('超时')); }, 10000);

            script.onload = () => {
                setTimeout(() => {
                    clearTimeout(timeoutId);
                    let netWorth = null;
                    if (window.Data_netWorthTrend && Array.isArray(window.Data_netWorthTrend)) {
                        netWorth = window.Data_netWorthTrend.map(item => ({ x: item.x, y: item.y }));
                    }
                    const name = window.fund_name || window.fS_name || code;
                    GLOBAL_KEYS.forEach(key => delete window[key]);
                    script.remove();

                    if (netWorth && netWorth.length > 0) {
                        const fundInfo = { code, name, netWorth, error: false };
                        // 存入缓存
                        appData.fundsCache[code] = fundInfo;
                        resolve(fundInfo);
                    } else {
                        reject(new Error('无净值'));
                    }
                }, 60);
            };
            script.onerror = () => {
                clearTimeout(timeoutId);
                GLOBAL_KEYS.forEach(key => delete window[key]);
                script.remove();
                reject(new Error('网络错误'));
            };
            document.head.appendChild(script);
        });
    }

    // 计算15日内最大跌幅（百分比，负值）
    function computeMaxDrop(netWorth, days = 15) {
        if (!netWorth || netWorth.length < 2) return null;
        const sorted = [...netWorth].sort((a,b) => new Date(b.x) - new Date(a.x));
        const latest = sorted[0].y;
        // 取最近days个点（如果不足则全部）
        const limit = Math.min(days, sorted.length - 1);
        let minReturn = 0;
        for (let i = 1; i <= limit; i++) {
            const ret = (latest / sorted[i].y - 1) * 100;
            if (ret < minReturn) minReturn = ret;
        }
        return minReturn;
    }

    // 计算最新净值日期和日涨跌
    function getLatestInfo(netWorth) {
        if (!netWorth || netWorth.length === 0) return { date: '', value: 0, change: null };
        const sorted = [...netWorth].sort((a,b) => new Date(b.x) - new Date(a.x));
        const latest = sorted[0];
        const prev = sorted[1];
        let change = null;
        if (prev) {
            change = ((latest.y / prev.y) - 1) * 100;
        }
        return { date: latest.x, value: latest.y, change };
    }

    // 计算涨幅
    function computeRates(netWorth) {
        if (!netWorth || netWorth.length === 0) return PERIODS.map(() => null);
        const sorted = [...netWorth].sort((a,b) => new Date(b.x) - new Date(a.x));
        const latest = sorted[0].y;
        return PERIODS.map(days => {
            if (sorted.length > days) {
                return ((latest / sorted[days].y) - 1) * 100;
            }
            return null;
        });
    }

    // 渲染当前分组的卡片
    async function renderCards() {
        const container = document.getElementById('cardContainer');
        if (!container) return;

        const currentGroup = appData.groups.find(g => g.id === currentGroupId);
        if (!currentGroup) return;

        const fundCodes = currentGroup.fundCodes;
        if (fundCodes.length === 0) {
            container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div style="font-size:48px;">📂</div><p>该分组暂无基金，输入代码添加</p></div>';
            return;
        }

        // 对于每个基金，获取缓存数据；若缓存缺失，则先显示加载占位并触发加载
        let html = '';
        for (let code of fundCodes) {
            let cached = appData.fundsCache[code];
            if (!cached) {
                cached = { code, name: '加载中...', netWorth: null, error: false };
                // 异步加载，不等待
                loadFundData(code).then(() => renderCards()).catch(() => {
                    appData.fundsCache[code] = { code, name: '加载失败', netWorth: null, error: true };
                    renderCards();
                });
            }

            const name = cached.name || code;
            const netWorth = cached.netWorth;
            const isError = cached.error;
            const isLoading = !isError && !netWorth;

            // 计算风险标记
            let riskFlag = false;
            let maxDrop = null;
            if (netWorth) {
                maxDrop = computeMaxDrop(netWorth, 15);
                if (maxDrop !== null && maxDrop <= RISK_THRESHOLD) riskFlag = true;
            }

            // 最新净值信息
            let latestHtml = '';
            if (netWorth) {
                const { date, value, change } = getLatestInfo(netWorth);
                const changeStr = change !== null ? (change > 0 ? `+${change.toFixed(2)}%` : `${change.toFixed(2)}%`) : '--';
                const changeClass = change > 0 ? 'positive' : (change < 0 ? 'negative' : '');
                latestHtml = `
                    <div class="latest-info">
                        <span class="date">${date}</span>
                        <span class="value">${value.toFixed(4)} <span class="change ${changeClass}">${changeStr}</span></span>
                    </div>
                `;
            } else if (isLoading) {
                latestHtml = `<div class="latest-info">加载中...</div>`;
            }

            // 涨幅率
            let ratesHtml = '';
            if (netWorth) {
                const rates = computeRates(netWorth);
                let items = '';
                PERIODS.forEach((period, idx) => {
                    const val = rates[idx];
                    let valueStr = '——', cls = 'neutral';
                    if (val !== null) {
                        valueStr = val.toFixed(2) + '%';
                        cls = val > 0 ? 'positive' : (val < 0 ? 'negative' : 'neutral');
                    }
                    items += `<div class="rate-item"><div class="rate-label">${period}D</div><div class="rate-value ${cls}">${valueStr}</div></div>`;
                });
                ratesHtml = `<div class="rates-grid">${items}</div>`;
            } else if (isError) {
                ratesHtml = `<div class="error-placeholder">加载失败</div>`;
            }

            const riskTag = riskFlag ? '<span class="risk-tag">⚠️ 跌幅大</span>' : '';

            html += `
                <div class="card ${riskFlag ? 'risk-highlight' : ''}" data-code="${code}">
                    <div class="card-header">
                        <div class="fund-title" title="${name}">${name.length > 18 ? name.slice(0,16)+'…' : name}</div>
                        <span class="fund-code">${code}</span>
                        <button class="delete-btn" data-code="${code}" title="删除">✕</button>
                    </div>
                    ${latestHtml}
                    ${ratesHtml}
                    ${riskTag}
                </div>
            `;
        }

        container.innerHTML = html;

        // 绑定删除事件
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const code = btn.getAttribute('data-code');
                if (code) deleteFund(code);
            });
        });

        // 绑定卡片点击（显示曲线）
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                // 如果点击的是删除按钮，不触发
                if (e.target.classList.contains('delete-btn')) return;
                const code = card.getAttribute('data-code');
                if (code) showFundChart(code);
            });
        });
    }

    // 删除基金
    function deleteFund(code) {
        const group = appData.groups.find(g => g.id === currentGroupId);
        if (group) {
            group.fundCodes = group.fundCodes.filter(c => c !== code);
            saveAppData();
            renderCards();
            renderGroups(); // 更新分组标记
        }
    }

    // 添加基金
    async function addFund() {
        const codeInput = document.getElementById('fundCodeInput');
        const groupSelect = document.getElementById('groupSelect');
        const code = codeInput.value.trim();
        if (!/^\d+$/.test(code)) { alert('请输入纯数字基金代码'); return; }

        const targetGroupId = groupSelect.value;
        const targetGroup = appData.groups.find(g => g.id === targetGroupId);
        if (!targetGroup) return;

        // 检查是否已存在（在所有分组中）
        const exists = appData.groups.some(g => g.fundCodes.includes(code));
        if (exists) { alert('该基金已存在于某个分组'); return; }

        // 验证基金有效性
        try {
            addBtn.disabled = true;
            addBtn.textContent = '验证中...';
            await loadFundData(code, true);
        } catch (e) {
            alert(`无效基金代码: ${e.message}`);
            addBtn.disabled = false;
            addBtn.textContent = '➕ 添加';
            return;
        } finally {
            addBtn.disabled = false;
            addBtn.textContent = '➕ 添加';
        }

        targetGroup.fundCodes.push(code);
        saveAppData();
        codeInput.value = '';
        renderCards();
        renderGroups();
    }

    // ---------- 曲线模态框 ----------
    function showFundChart(code) {
        const fund = appData.fundsCache[code];
        if (!fund || !fund.netWorth) {
            alert('基金数据尚未加载完成');
            return;
        }
        currentModalFund = fund;
        document.getElementById('modalFundName').textContent = fund.name + ' (' + code + ')';
        document.getElementById('chartModal').classList.add('active');
        // 默认15日
        drawChart(15);
    }

    function drawChart(days) {
        if (!currentModalFund || !currentModalFund.netWorth) return;
        const netWorth = currentModalFund.netWorth;
        // 按日期升序 (旧到新)
        const sorted = [...netWorth].sort((a,b) => new Date(a.x) - new Date(b.x));
        const latest = sorted[sorted.length-1].y;
        // 取最近days个点 (若不足则全部)
        const slice = sorted.slice(-days);
        const labels = slice.map(d => d.x);
        // 计算相对于第一个点的累计收益率？或者直接显示净值？我们显示涨跌率，即相对于第一个点的收益率？
        // 题目要求“近15天、30天、60天、90天自然日的涨跌率曲线”，应该显示每天的涨跌率（相对于前一日）？还是累计？通常曲线是累计收益率。
        // 为了直观，我们显示累计收益率，以起始日为基准0%。
        const startY = slice[0]?.y || 1;
        const returns = slice.map(d => ((d.y / startY) - 1) * 100);

        const ctx = document.getElementById('fundChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '累计涨跌率 (%)',
                    data: returns,
                    borderColor: '#3b82f6',
                    tension: 0.1,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: { callbacks: { label: (ctx) => ctx.raw.toFixed(2) + '%' } }
                }
            }
        });
    }

    // ---------- 初始化与云端同步 ----------
    async function init() {
        // 先尝试从云端加载
        if (s3) {
            try {
                const cloudData = await loadFromCloud();
                if (cloudData && cloudData.groups) {
                    appData = cloudData;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
                }
            } catch (e) {
                console.warn('cloud load failed, use local', e);
            }
        }
        // 加载本地数据（可能被云端覆盖）
        loadAppData();

        // 渲染分组和卡片
        renderGroups();
        await renderCards();

        // 事件绑定
        document.getElementById('addFundBtn').addEventListener('click', addFund);
        document.getElementById('syncToCloudBtn').addEventListener('click', async () => {
            const status = document.getElementById('syncStatus');
            status.textContent = '同步中...';
            try {
                await saveToCloud(appData);
                status.textContent = '✅ 同步成功';
                setTimeout(() => status.textContent = '', 2000);
            } catch (e) {
                status.textContent = '❌ 失败';
                setTimeout(() => status.textContent = '', 2000);
            }
        });

        // 模态框关闭
        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('chartModal').classList.remove('active');
        });
        // 点击模态框背景关闭
        document.getElementById('chartModal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                document.getElementById('chartModal').classList.remove('active');
            }
        });

        // 周期切换
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const days = parseInt(btn.getAttribute('data-days'), 10);
                drawChart(days);
            });
        });

        // 输入框只能数字
        document.getElementById('fundCodeInput').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });
    }

    init();
})();
</script>
